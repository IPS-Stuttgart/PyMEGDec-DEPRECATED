name: Manual stimulus latent autoencoder LOSO
#checkov:skip=CKV_GHA_7:Manual workflow inputs are constrained to source-only experimental decoding parameters.

on:
  workflow_dispatch:
    inputs:
      data_cache_version:
        description: Cache version suffix for meg-data-main-Linux-*.
        required: true
        default: v2
        type: string
      participants:
        description: Participant ids used for LOSO training/testing.
        required: true
        default: "1-4,6,8,9,10,13-27"
        type: string
      outer_participants:
        description: Optional held-out participant subset. Empty means all participants.
        required: false
        default: ""
        type: string
      output_stem:
        description: Output CSV stem.
        required: true
        default: latent_autoencoder_pca160_z64
        type: string
      epochs:
        description: Maximum training epochs per outer fold.
        required: true
        default: "80"
        type: string
      latent_training_preset:
        description: Named latent-AE preset; anti-collapse presets override compatible training/calibration inputs.
        required: true
        default: none
        type: choice
        options:
          - none
          - anti_collapse_train
          - anti_collapse_calibrated
      validation_source_count:
        description: Source participants held out for early stopping/calibration.
        required: true
        default: "2"
        type: string
      reconstruction_weight:
        description: Subject-decoder reconstruction loss weight.
        required: true
        default: "0.03"
        type: string
      subject_adversary_weight:
        description: Gradient-reversal subject-adversary weight; 0 disables it.
        required: true
        default: "0"
        type: string
      prediction_balance_weight:
        description: Minibatch predicted-class balance regularization weight; 0 disables it.
        required: true
        default: "0"
        type: string
      prediction_balance_target_smoothing:
        description: Balance target smoothing; 0=batch labels, 1=uniform.
        required: true
        default: "1"
        type: string
      prediction_balance_temperature:
        description: Softmax temperature for prediction-balance regularization; <1 targets hard argmax collapse.
        required: true
        default: "1"
        type: string
      logit_mean_center_weight:
        description: Penalize minibatch-level class-logit offsets; 0 disables it.
        required: true
        default: "0"
        type: string
      confidence_penalty_weight:
        description: Entropy confidence penalty on training logits; 0 disables it.
        required: true
        default: "0"
        type: string
      label_smoothing:
        description: Cross-entropy label smoothing for latent AE training; 0 disables it.
        required: true
        default: "0.05"
        type: string
      focal_loss_gamma:
        description: Focal-loss gamma for latent AE classification; 0 disables focal modulation.
        required: true
        default: "0.0"
        type: string
      margin_loss_weight:
        description: True-class-vs-best-negative margin loss weight; 0 disables it.
        required: true
        default: "0"
        type: string
      margin_loss_value:
        description: Required true-class logit margin over the strongest competing class.
        required: true
        default: "1.0"
        type: string
      soft_macro_recall_weight:
        description: Differentiable macro-recall / balanced-accuracy surrogate loss weight; 0 disables it.
        required: true
        default: "0"
        type: string
      soft_worst_class_recall_weight:
        description: Differentiable worst-class soft-recall surrogate loss weight; 0 disables it.
        required: true
        default: "0"
        type: string
      supervised_contrastive_weight:
        description: Source-only supervised contrastive latent loss weight; 0 disables it.
        required: true
        default: "0"
        type: string
      supervised_contrastive_temperature:
        description: Temperature for the optional supervised contrastive latent loss.
        required: true
        default: "0.2"
        type: string
      ensemble_seeds:
        description: Optional comma-separated final-refit seeds for latent score averaging; empty uses --seed only.
        required: false
        default: ""
        type: string
      validation_prediction_balance_weight:
        description: Early-stopping penalty for source-validation class-prediction imbalance; 0 disables it.
        required: true
        default: "0.0"
        type: string
      validation_source_strategy:
        description: Source-validation participant selection for early stopping/calibration.
        required: true
        default: rotating
        type: choice
        options:
          # Rotate by held-out participant so full LOSO runs do not always early-stop
          # on the same two source subjects.
          - rotating
          - spread
          - tail
          - head
      balanced_batch_sampling:
        description: Interleave classes within training epochs so minibatches are class-diverse.
        required: true
        default: false
        type: boolean
      latent_dim:
        description: Shared latent dimension.
        required: true
        default: "64"
        type: string
      hidden_dim:
        description: Encoder/decoder hidden dimension.
        required: true
        default: "128"
        type: string
      components_pca:
        description: Source-fitted PCA components before the neural encoder.
        required: true
        default: "160"
        type: string
      batch_size:
        description: Torch minibatch size.
        required: true
        default: "256"
        type: string
      patience:
        description: Early-stopping patience after source-validation non-improvement.
        required: true
        default: "12"
        type: string
      label_shuffle_control:
        description: Shuffle source labels within participants for a null control.
        required: true
        default: false
        type: boolean
      label_shuffle_seed:
        description: Seed for label-shuffle control.
        required: true
        default: "0"
        type: string
      score_calibration:
        description: Source-validation-only score calibration mode.
        required: true
        default: none
        type: choice
        options:
          - none
          - validation_class_bias
          - validation_class_bias_guarded
          - validation_prediction_bias
          - validation_argmax_class_bias
          - validation_argmax_class_bias_guarded
          - validation_temperature_class_bias_guarded
          - validation_temperature_argmax_class_bias_guarded
          - validation_rank_prior_bias_guarded
          - validation_confusion_blend
          - validation_logistic_stack
          - validation_logistic_stack_guarded
          - validation_class_zscore
          - validation_class_zscore_guarded
          - validation_score_standardize
          - validation_score_standardize_guarded
          - validation_selected_guarded
      score_calibration_alphas:
        description: Candidate alpha strengths for source-validation class-bias calibration.
        required: true
        default: "0,0.25,0.5,0.75,1"
        type: string
      score_calibration_logistic_c_values:
        description: Candidate C values for validation_logistic_stack calibration.
        required: true
        default: "0.03,0.1,0.3,1"
        type: string
      score_calibration_temperatures:
        description: Candidate logit temperatures for validation_temperature_* calibration.
        required: true
        default: "0.5,0.75,1,1.5,2,3"
        type: string
      score_calibration_smoothing:
        description: Additive smoothing for score-calibration priors.
        required: true
        default: "1.0"
        type: string
      score_calibration_confusion_smoothing:
        description: Identity pseudo-counts per class for validation_confusion_blend.
        required: true
        default: "4.0"
        type: string
      score_calibration_selection_metric:
        description: Source-validation objective for guarded score calibration.
        required: true
        default: balanced_top2_top3_rank_balance
        type: choice
        options:
          - balanced_accuracy
          - balanced_top2_top3_rank
          - balanced_top2_top3_rank_balance
      score_calibration_guard_tolerance:
        description: Allowed guarded-calibration balanced-accuracy drop on source validation.
        required: true
        default: "0.0"
        type: string
      score_calibration_final_refit:
        description: Refit the selected source-validation score calibration on final source-training scores.
        required: true
        default: false
        type: boolean
      prediction_postprocessing:
        description: Optional source-prior postprocessing of held-out scores.
        required: true
        default: none
        type: choice
        options:
          - none
          - source_prior_balanced_assignment
          - source_prior_soft_balanced_assignment
          - validation_guarded_source_prior_balanced_assignment
          - validation_guarded_source_prior_soft_balanced_assignment
          - validation_guarded_shrunk_source_prior_balanced_assignment
          - validation_selected_balanced_assignment
      prediction_postprocessing_shrinkage_alphas:
        description: Candidate shrinkage strengths for guarded shrunk source-prior assignment.
        required: true
        default: "0,0.25,0.5,0.75,1"
        type: string
      prediction_postprocessing_guard_tolerance:
        description: Allowed validation balanced-accuracy drop for guarded prediction postprocessing.
        required: true
        default: "0.0"
        type: string
      prediction_postprocessing_quota_strength:
        description: Blend strength for soft source-prior postprocessing.
        required: true
        default: "1.0"
        type: string

permissions:
  contents: read
  actions: read

jobs:
  latent-autoencoder:
    name: Latent autoencoder LOSO
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Restore main MEG cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/meg-data-main
          key: meg-data-main-Linux-${{ inputs.data_cache_version }}
          fail-on-cache-miss: true
      - name: Install package and CPU torch
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
      - name: Run latent autoencoder LOSO
        env:
          LABEL_SHUFFLE: ${{ inputs.label_shuffle_control }}
          OUTER_PARTICIPANTS: ${{ inputs.outer_participants }}
          ENSEMBLE_SEEDS: ${{ inputs.ensemble_seeds }}
          BALANCED_BATCH_SAMPLING: ${{ inputs.balanced_batch_sampling }}
          SCORE_CALIBRATION_FINAL_REFIT: ${{ inputs.score_calibration_final_refit }}
        run: |
          mkdir -p outputs
          ARGS=(
            --data-dir .cache/meg-data-main
            --participants "${{ inputs.participants }}"
            --window-center 0.175
            --window-size 0.150
            --baseline-window -0.35:-0.05
            --feature-mode sensor_flat
            --normalization subject_baseline_whiten
            --components-pca "${{ inputs.components_pca }}"
            --latent-dim "${{ inputs.latent_dim }}"
            --latent-training-preset "${{ inputs.latent_training_preset }}"
            --hidden-dim "${{ inputs.hidden_dim }}"
            --reconstruction-weight "${{ inputs.reconstruction_weight }}"
            --subject-adversary-weight "${{ inputs.subject_adversary_weight }}"
            --prediction-balance-weight "${{ inputs.prediction_balance_weight }}"
            --prediction-balance-target-smoothing "${{ inputs.prediction_balance_target_smoothing }}"
            --prediction-balance-temperature "${{ inputs.prediction_balance_temperature }}"
            --logit-mean-center-weight "${{ inputs.logit_mean_center_weight }}"
            --confidence-penalty-weight "${{ inputs.confidence_penalty_weight }}"
            --label-smoothing "${{ inputs.label_smoothing }}"
            --focal-loss-gamma "${{ inputs.focal_loss_gamma }}"
            --margin-loss-weight "${{ inputs.margin_loss_weight }}"
            --margin-loss-value "${{ inputs.margin_loss_value }}"
            --soft-macro-recall-weight "${{ inputs.soft_macro_recall_weight }}"
            --soft-worst-class-recall-weight "${{ inputs.soft_worst_class_recall_weight }}"
            --supervised-contrastive-weight "${{ inputs.supervised_contrastive_weight }}"
            --supervised-contrastive-temperature "${{ inputs.supervised_contrastive_temperature }}"
            --validation-prediction-balance-weight "${{ inputs.validation_prediction_balance_weight }}"
            --epochs "${{ inputs.epochs }}"
            --batch-size "${{ inputs.batch_size }}"
            --validation-source-count "${{ inputs.validation_source_count }}"
            --validation-source-strategy "${{ inputs.validation_source_strategy }}"
            --patience "${{ inputs.patience }}"
            --device cpu
            --num-threads 1
            --score-calibration "${{ inputs.score_calibration }}"
            --score-calibration-alphas "${{ inputs.score_calibration_alphas }}"
            --score-calibration-logistic-c-values "${{ inputs.score_calibration_logistic_c_values }}"
            --score-calibration-temperatures "${{ inputs.score_calibration_temperatures }}"
            --score-calibration-smoothing "${{ inputs.score_calibration_smoothing }}"
            --score-calibration-confusion-smoothing "${{ inputs.score_calibration_confusion_smoothing }}"
            --score-calibration-selection-metric "${{ inputs.score_calibration_selection_metric }}"
            --score-calibration-guard-tolerance "${{ inputs.score_calibration_guard_tolerance }}"
            --prediction-postprocessing "${{ inputs.prediction_postprocessing }}"
            --prediction-postprocessing-shrinkage-alphas "${{ inputs.prediction_postprocessing_shrinkage_alphas }}"
            --prediction-postprocessing-guard-tolerance "${{ inputs.prediction_postprocessing_guard_tolerance }}"
            --prediction-postprocessing-quota-strength "${{ inputs.prediction_postprocessing_quota_strength }}"
            --seed 0
            --outer-output "outputs/${{ inputs.output_stem }}_outer.csv"
            --summary-output "outputs/${{ inputs.output_stem }}_group_summary.csv"
            --predictions-output "outputs/${{ inputs.output_stem }}_predictions.csv"
            --confusion-output "outputs/${{ inputs.output_stem }}_confusion.csv"
            --per-stimulus-output "outputs/${{ inputs.output_stem }}_per_stimulus.csv"
            --confusion-pairs-output "outputs/${{ inputs.output_stem }}_confusion_pairs.csv"
          )
          if [ -n "${OUTER_PARTICIPANTS}" ]; then
            ARGS+=(--outer-participants "${OUTER_PARTICIPANTS}")
          fi
          if [ -n "${ENSEMBLE_SEEDS}" ]; then
            ARGS+=(--ensemble-seeds "${ENSEMBLE_SEEDS}")
          fi
          if [ "${BALANCED_BATCH_SAMPLING}" = "true" ]; then
            ARGS+=(--balanced-batch-sampling)
          fi
          if [ "${SCORE_CALIBRATION_FINAL_REFIT}" = "true" ]; then
            ARGS+=(--score-calibration-final-refit)
          fi
          if [ "${LABEL_SHUFFLE}" = "true" ]; then
            ARGS+=(--label-shuffle-control --label-shuffle-seed "${{ inputs.label_shuffle_seed }}")
          fi
          pymegdec stimulus cross-subject-latent-autoencoder "${ARGS[@]}"
      - name: Upload latent autoencoder artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_stem }}
          path: outputs/${{ inputs.output_stem }}*.csv
          if-no-files-found: error
