name: Manual NeuRepTrace onset benchmark
#checkov:skip=CKV_GHA_7:Manual workflow inputs are constrained to analysis parameters and used only after shell quoting.

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: Python version used for the analysis environment.
        required: true
        default: "3.13"
        type: string
      observation_csvs:
        description: Space-separated NeuRepTrace probability observation CSV paths or glob patterns.
        required: true
        default: "outputs/stimulus_probability_observations.csv"
        type: string
      threshold_window:
        description: Baseline threshold window as start,stop in seconds.
        required: true
        default: "-0.35,-0.05"
        type: string
      threshold_quantile:
        description: Detection threshold quantile.
        required: true
        default: "0.95"
        type: string
      detection_start_s:
        description: Optional earliest scan center considered for detection. Leave empty for true false-alarm benchmarking.
        required: false
        default: ""
        type: string
      min_consecutive:
        description: Minimum adjacent above-threshold windows for robust detections.
        required: true
        default: "2"
        type: string
      min_duration:
        description: Minimum run duration in seconds for robust detections.
        required: true
        default: "0.05"
        type: string
      run_point_baseline:
        description: Also run the pointwise threshold baseline for comparison.
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  onset-benchmark:
    name: Detect onsets from NeuRepTrace observations
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      OBSERVATION_CSVS: ${{ inputs.observation_csvs }}
      THRESHOLD_WINDOW: ${{ inputs.threshold_window }}
      THRESHOLD_QUANTILE: ${{ inputs.threshold_quantile }}
      DETECTION_START_S: ${{ inputs.detection_start_s }}
      MIN_CONSECUTIVE: ${{ inputs.min_consecutive }}
      MIN_DURATION: ${{ inputs.min_duration }}
      RUN_POINT_BASELINE: ${{ inputs.run_point_baseline }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install package
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Resolve observation CSV inputs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import glob
          import os
          import shlex

          patterns = shlex.split(os.environ["OBSERVATION_CSVS"])
          if not patterns:
              raise SystemExit("No observation CSV inputs were provided.")
          resolved = []
          for pattern in patterns:
              matches = sorted(glob.glob(pattern))
              if matches:
                  resolved.extend(matches)
              elif Path(pattern).exists():
                  resolved.append(pattern)
              else:
                  raise SystemExit(f"Observation CSV input does not exist or match any file: {pattern}")
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as handle:
              handle.write("RESOLVED_OBSERVATION_CSVS=" + " ".join(shlex.quote(path) for path in resolved) + "\n")
          print("Resolved observation CSVs:")
          for path in resolved:
              print(f"  {path}")
          PY

      - name: Run robust onset detection
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p outputs
          # shellcheck disable=SC2206
          observations=( ${RESOLVED_OBSERVATION_CSVS} )
          args=(
            python scripts/export_stimulus_onset_scan.py
            --observation-csv "${observations[@]}"
            "--threshold-window=${THRESHOLD_WINDOW}"
            --threshold-quantile "${THRESHOLD_QUANTILE}"
            --threshold-method max_run
            --min-consecutive "${MIN_CONSECUTIVE}"
            --min-duration "${MIN_DURATION}"
            --require-stable-prediction
            --output outputs/stimulus_onset_scan_robust.csv
            --events-output outputs/stimulus_onset_events_robust.csv
            --summary-output outputs/stimulus_onset_scan_summary_robust.csv
            --event-summary-output outputs/stimulus_onset_event_summary_robust.csv
          )
          if [[ -n "${DETECTION_START_S}" ]]; then
            args+=(--detection-start-s "${DETECTION_START_S}")
          fi
          "${args[@]}"

      - name: Run pointwise baseline
        if: ${{ env.RUN_POINT_BASELINE == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2206
          observations=( ${RESOLVED_OBSERVATION_CSVS} )
          args=(
            python scripts/export_stimulus_onset_scan.py
            --observation-csv "${observations[@]}"
            "--threshold-window=${THRESHOLD_WINDOW}"
            --threshold-quantile "${THRESHOLD_QUANTILE}"
            --threshold-method point
            --output outputs/stimulus_onset_scan_point.csv
            --events-output outputs/stimulus_onset_events_point.csv
            --summary-output outputs/stimulus_onset_scan_summary_point.csv
            --event-summary-output outputs/stimulus_onset_event_summary_point.csv
          )
          if [[ -n "${DETECTION_START_S}" ]]; then
            args+=(--detection-start-s "${DETECTION_START_S}")
          fi
          "${args[@]}"

      - name: Run point operating-point sweep
        if: ${{ env.RUN_POINT_BASELINE == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            python scripts/export_stimulus_onset_operating_point_sweep.py
            --scan-input outputs/stimulus_onset_scan_point.csv
            "--threshold-window=${THRESHOLD_WINDOW}"
            --threshold-quantiles 0.95,0.975,0.99
            --min-consecutives 1,2,3
            --min-durations 0.025,0.05,0.075
            --max-false-alarm-rate 0.05
            --events-output outputs/stimulus_onset_events_point_sweep.csv
            --event-summary-output outputs/stimulus_onset_event_summary_point_sweep.csv
            --summary-output outputs/stimulus_onset_operating_point_sweep.csv
            --selected-output outputs/stimulus_onset_operating_point_selected.csv
            --selected-events-output outputs/stimulus_onset_events_point_selected.csv
            --selected-event-summary-output outputs/stimulus_onset_event_summary_point_selected.csv
          )
          if [[ -n "${DETECTION_START_S}" ]]; then
            args+=(--detection-start-s "${DETECTION_START_S}")
          fi
          "${args[@]}"

      - name: Run max-run operating-point sweep
        shell: bash
        run: |
          set -euo pipefail
          args=(
            python scripts/export_stimulus_onset_operating_point_sweep.py
            --scan-input outputs/stimulus_onset_scan_robust.csv
            --threshold-method max_run
            "--threshold-window=${THRESHOLD_WINDOW}"
            --threshold-quantiles 0.955,0.96,0.965,0.97,0.975
            --min-consecutives 2
            --min-durations 0.05
            --require-stable-prediction-values true,false
            --max-false-alarm-rate 0.05
            --events-output outputs/stimulus_onset_events_max_run_sweep.csv
            --event-summary-output outputs/stimulus_onset_event_summary_max_run_sweep.csv
            --summary-output outputs/stimulus_onset_operating_point_max_run_sweep.csv
            --selected-output outputs/stimulus_onset_operating_point_max_run_selected.csv
            --selected-events-output outputs/stimulus_onset_events_max_run_selected.csv
            --selected-event-summary-output outputs/stimulus_onset_event_summary_max_run_selected.csv
          )
          if [[ -n "${DETECTION_START_S}" ]]; then
            args+=(--detection-start-s "${DETECTION_START_S}")
          fi
          "${args[@]}"

      - name: Upload onset outputs
        uses: actions/upload-artifact@v5
        with:
          name: stimulus-onset-outputs
          path: outputs/stimulus_onset_*.csv
          if-no-files-found: error
