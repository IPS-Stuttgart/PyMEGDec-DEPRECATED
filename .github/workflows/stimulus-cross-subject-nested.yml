name: Manual stimulus cross-subject nested
#checkov:skip=CKV_GHA_7:Manual workflow inputs are constrained to analysis parameters and used only after shell quoting.

on:
  workflow_dispatch:
    inputs:
      runner_type:
        description: Runner backend used for the nested benchmark.
        required: true
        default: github-hosted
        type: choice
        options: [github-hosted, self-hosted]
      github_runner_label:
        description: GitHub-hosted runner label used when runner_type=github-hosted.
        required: true
        default: ubuntu-latest
        type: string
      self_hosted_runner_label:
        description: Self-hosted runner label used when runner_type=self-hosted.
        required: true
        default: self-hosted
        type: string
      python_version:
        description: Python version used for the analysis environment.
        required: true
        default: "3.13"
        type: string
      use_nextcloud_data:
        description: Restore/download/cache the MEG data before running.
        required: true
        default: true
        type: boolean
      data_cache_version:
        description: MEG data cache version.
        required: true
        default: v2
        type: string
      data_dir:
        description: Relative data directory to restore/populate.
        required: true
        default: .cache/meg-data-main
        type: string
      benchmark_preset:
        description: Screening keeps the trial cap; final-all-trials ignores it and writes final_all_trials artifacts.
        required: true
        default: screening
        type: choice
        options: [screening, final-all-trials]
      participants:
        description: Participant ids such as 1-4,6,8.
        required: true
        default: "1-4,6,8,9,10,13-27"
        type: string
      outer_participants:
        description: Optional held-out participant ids to evaluate in this run. Empty means all participants.
        required: false
        default: ""
        type: string
      window_centers:
        description: Candidate window centers in seconds.
        required: true
        default: "0.150,0.175,0.200"
        type: string
      window_size:
        description: Stimulus decoding window size in seconds.
        required: true
        default: "0.1"
        type: string
      baseline_window:
        description: Baseline normalization window as start,stop in seconds.
        required: true
        default: "-0.5,0.0"
        type: string
      feature_modes:
        description: Candidate feature modes.
        required: true
        default: sensor_flat,sensor_mean_slope,sensor_mean_slope_std
        type: string
      normalizations:
        description: Candidate normalization modes.
        required: true
        default: subject_baseline_z,subject_trial_z,subject_baseline_whiten
        type: string
      alignments:
        description: Candidate training alignment modes.
        required: true
        default: none
        type: string
      classifiers:
        description: Candidate classifier names.
        required: true
        default: multinomial-logistic,multinomial-logistic-weighted,shrinkage-lda,shrinkage-prototype,regularized-qda,gaussian-naive-bayes,multiclass-svm
        type: string
      classifier_params:
        description: Candidate classifier parameters; use default for classifier defaults or auto-grid for classifier-specific tuning grids.
        required: true
        default: auto-grid
        type: string
      components_pca_values:
        description: Candidate PCA component counts, inf, or auto-grid for 32,64,128.
        required: true
        default: auto-grid
        type: string
      selection_ensemble_size:
        description: Top-K inner-LOSO candidates to ensemble by row-normalized class scores. Use 1 for single-winner nested selection.
        required: true
        default: "1"
        type: string
      selection_ensemble_diversity:
        description: Prefer diverse candidates before filling the top-K ensemble.
        required: true
        default: none
        type: choice
        options: [none, window, classifier, window_classifier, full_config]
      selection_ensemble_score_normalization:
        description: Per-candidate score normalization before top-K ensemble averaging.
        required: true
        default: row_z_softmax
        type: choice
        options: [row_z_softmax, rank_softmax]
      selection_ensemble_weighting:
        description: Weighting for top-K ensemble candidates.
        required: true
        default: uniform
        type: choice
        options: [uniform, inner_softmax, inner_lcb_softmax]
      selection_ensemble_temperature:
        description: Softmax temperature for inner score-based ensemble weighting.
        required: true
        default: "0.02"
        type: string
      max_trials_per_class_per_participant:
        description: Optional screening trial cap per stimulus class and participant. Ignored when benchmark_preset=final-all-trials.
        required: false
        default: "10"
        type: string
      label_shuffle_control:
        description: Shuffle training labels within each participant as a nested null control.
        required: true
        default: false
        type: boolean
      label_shuffle_seed:
        description: Seed for the nested label-shuffle control.
        required: true
        default: "0"
        type: string
      stimulus_metadata_path:
        description: Optional repository path to a stimulus metadata CSV for confusion-category summaries.
        required: false
        default: ""
        type: string
      confusion_category_columns:
        description: Optional comma-separated metadata category columns for confusion-category summaries.
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  cross-subject-nested:
    name: Cross-subject nested
    runs-on: ${{ inputs.runner_type == 'github-hosted' && inputs.github_runner_label || inputs.self_hosted_runner_label }}
    timeout-minutes: 720
    env:
      DATA_DIR: ${{ inputs.data_dir }}
      BENCHMARK_PRESET: ${{ inputs.benchmark_preset }}
      USE_NEXTCLOUD_DATA: ${{ inputs.use_nextcloud_data }}
      DATA_CACHE_VERSION: ${{ inputs.data_cache_version }}
      PARTICIPANTS: ${{ inputs.participants }}
      OUTER_PARTICIPANTS: ${{ inputs.outer_participants }}
      WINDOW_CENTERS: ${{ inputs.window_centers }}
      WINDOW_SIZE: ${{ inputs.window_size }}
      BASELINE_WINDOW: ${{ inputs.baseline_window }}
      FEATURE_MODES: ${{ inputs.feature_modes }}
      NORMALIZATIONS: ${{ inputs.normalizations }}
      ALIGNMENTS: ${{ inputs.alignments }}
      CLASSIFIERS: ${{ inputs.classifiers }}
      CLASSIFIER_PARAMS: ${{ inputs.classifier_params }}
      COMPONENTS_PCA_VALUES: ${{ inputs.components_pca_values }}
      SELECTION_ENSEMBLE_SIZE: ${{ inputs.selection_ensemble_size }}
      SELECTION_ENSEMBLE_DIVERSITY: ${{ inputs.selection_ensemble_diversity }}
      SELECTION_ENSEMBLE_SCORE_NORMALIZATION: ${{ inputs.selection_ensemble_score_normalization }}
      SELECTION_ENSEMBLE_WEIGHTING: ${{ inputs.selection_ensemble_weighting }}
      SELECTION_ENSEMBLE_TEMPERATURE: ${{ inputs.selection_ensemble_temperature }}
      MAX_TRIALS_PER_CLASS_PER_PARTICIPANT: ${{ inputs.max_trials_per_class_per_participant }}
      LABEL_SHUFFLE_CONTROL: ${{ inputs.label_shuffle_control }}
      LABEL_SHUFFLE_SEED: ${{ inputs.label_shuffle_seed }}
      STIMULUS_METADATA_PATH: ${{ inputs.stimulus_metadata_path }}
      CONFUSION_CATEGORY_COLUMNS: ${{ inputs.confusion_category_columns }}
      MAIN_FILE_NAMES: >-
        Part1Data.mat,Part2Data.mat,Part3Data.mat,Part4Data.mat,Part6Data.mat,
        Part8Data.mat,Part9Data.mat,Part10Data.mat,Part13Data.mat,Part14Data.mat,
        Part15Data.mat,Part16Data.mat,Part17Data.mat,Part18Data.mat,Part19Data.mat,
        Part20Data.mat,Part21Data.mat,Part22Data.mat,Part23Data.mat,Part24Data.mat,
        Part25Data.mat,Part26Data.mat,Part27Data.mat

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare main MEG data
        if: ${{ env.USE_NEXTCLOUD_DATA == 'true' }}
        timeout-minutes: 90
        uses: ./.github/actions/prepare-meg-data
        with:
          data-dir: ${{ env.DATA_DIR }}
          cache-version: ${{ env.DATA_CACHE_VERSION }}
          cache-key: meg-data-main-${{ runner.os }}-${{ env.DATA_CACHE_VERSION }}
          file-names: ${{ env.MAIN_FILE_NAMES }}
          require-cue-files: "false"
          expected-main-files: "23"
          webdav-url: ${{ secrets.BUSHMEG_WEBDAV_URL }}
          webdav-user: ${{ secrets.BUSHMEG_DATA_KEY }}
          webdav-password: ${{ secrets.BUSHMEG_DATA_PASSWORD }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install package
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Validate main data files
        shell: bash
        run: |
          set -euo pipefail
          main_count="$(find -L "${DATA_DIR}" -name 'Part*Data.mat' ! -name 'Part*CueData.mat' | wc -l | tr -d ' ')"
          echo "Main files: ${main_count}"
          test "${main_count}" -ge 23

      - name: Run nested cross-subject benchmark
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p outputs
          output_stem="stimulus_cross_subject_nested"
          if [[ "${BENCHMARK_PRESET}" == "final-all-trials" ]]; then
            output_stem="${output_stem}_final_all_trials"
          fi
          if [[ "${LABEL_SHUFFLE_CONTROL}" == "true" ]]; then
            output_stem="${output_stem}_label_shuffle"
          fi
          output_prefix="outputs/${output_stem}"
          effective_trial_cap="${MAX_TRIALS_PER_CLASS_PER_PARTICIPANT}"
          if [[ "${BENCHMARK_PRESET}" == "final-all-trials" ]]; then
            effective_trial_cap=""
          fi
          echo "Nested benchmark preset: ${BENCHMARK_PRESET}"
          echo "Effective trial cap per class/participant: ${effective_trial_cap:-all trials}"
          echo "Output prefix: ${output_prefix}"
          args=(
            python scripts/export_stimulus_cross_subject_nested.py
            --data-dir "${DATA_DIR}"
            --participants "${PARTICIPANTS}"
            --window-centers "${WINDOW_CENTERS}"
            --window-size "${WINDOW_SIZE}"
            --baseline-window "${BASELINE_WINDOW}"
            --feature-modes "${FEATURE_MODES}"
            --normalizations "${NORMALIZATIONS}"
            --alignments "${ALIGNMENTS}"
            --classifiers "${CLASSIFIERS}"
            --classifier-params "${CLASSIFIER_PARAMS}"
            --components-pca-values "${COMPONENTS_PCA_VALUES}"
            --selection-ensemble-size "${SELECTION_ENSEMBLE_SIZE}"
            --selection-ensemble-diversity "${SELECTION_ENSEMBLE_DIVERSITY}"
            --selection-ensemble-score-normalization "${SELECTION_ENSEMBLE_SCORE_NORMALIZATION}"
            --selection-ensemble-weighting "${SELECTION_ENSEMBLE_WEIGHTING}"
            --selection-ensemble-temperature "${SELECTION_ENSEMBLE_TEMPERATURE}"
            --outer-output "${output_prefix}_outer.csv"
            --summary-output "${output_prefix}_group_summary.csv"
            --inner-validation-output "${output_prefix}_inner_validation.csv"
            --selected-output "${output_prefix}_selected.csv"
            --predictions-output "${output_prefix}_predictions.csv"
            --confusion-output "${output_prefix}_confusion.csv"
            --per-stimulus-output "${output_prefix}_per_stimulus.csv"
            --confusion-pairs-output "${output_prefix}_confusion_pairs.csv"
            --write-incremental
          )
          if [[ "${LABEL_SHUFFLE_CONTROL}" == "true" ]]; then
            args+=(--label-shuffle-control --label-shuffle-seed "${LABEL_SHUFFLE_SEED}")
          fi
          if [[ -n "${effective_trial_cap}" ]]; then
            args+=(--max-trials-per-class-per-participant "${effective_trial_cap}")
          fi
          if [[ -n "${OUTER_PARTICIPANTS}" ]]; then
            args+=(--outer-participants "${OUTER_PARTICIPANTS}")
          fi
          "${args[@]}"

          if [[ -n "${STIMULUS_METADATA_PATH}" ]]; then
            if [[ ! -f "${STIMULUS_METADATA_PATH}" ]]; then
              echo "Stimulus metadata file not found: ${STIMULUS_METADATA_PATH}" >&2
              exit 1
            fi
            confusion_args=(
              python scripts/export_stimulus_confusion_structure.py
              --predictions "${output_prefix}_predictions.csv"
              --stimulus-metadata "${STIMULUS_METADATA_PATH}"
              --output "${output_prefix}_confusion_pairs.csv"
              --category-output "${output_prefix}_category_enrichment.csv"
              --category-matrix-output "${output_prefix}_category_matrix.csv"
            )
            if [[ -n "${CONFUSION_CATEGORY_COLUMNS}" ]]; then
              confusion_args+=(--category-columns "${CONFUSION_CATEGORY_COLUMNS}")
            fi
            "${confusion_args[@]}"
          fi

      - name: Append workflow summary
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import math
          import os
          from pathlib import Path

          benchmark_preset = os.environ.get("BENCHMARK_PRESET", "screening")
          output_prefix = "stimulus_cross_subject_nested"
          if benchmark_preset == "final-all-trials":
              output_prefix = f"{output_prefix}_final_all_trials"
          if os.environ.get("LABEL_SHUFFLE_CONTROL") == "true":
              output_prefix = f"{output_prefix}_label_shuffle"
          summary_path = Path("outputs") / f"{output_prefix}_group_summary.csv"
          selected_path = Path("outputs") / f"{output_prefix}_selected.csv"
          pairs_path = Path("outputs") / f"{output_prefix}_confusion_pairs.csv"
          category_path = Path("outputs") / f"{output_prefix}_category_enrichment.csv"
          if not summary_path.exists() or not selected_path.exists():
              Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(
                  f"# Stimulus cross-subject nested\n\nNo nested benchmark CSV outputs were produced for `{output_prefix}`.\n",
                  encoding="utf-8",
              )
              raise SystemExit(0)

          summary = next(csv.DictReader(summary_path.open(newline="", encoding="utf-8")))
          selected_rows = list(csv.DictReader(selected_path.open(newline="", encoding="utf-8")))
          pair_rows = list(csv.DictReader(pairs_path.open(newline="", encoding="utf-8"))) if pairs_path.exists() else []
          top_pairs = sorted(pair_rows, key=lambda row: float(row.get("pair_standardized_residual") or row["total_confusions"]), reverse=True)[:5]

          def percent_summary(key):
              try:
                  value = float(summary.get(key, "nan"))
              except ValueError:
                  return "n/a"
              if not math.isfinite(value):
                  return "n/a"
              return f"{100.0 * value:.2f}%"

          def percent_row(row, key):
              try:
                  value = float(row.get(key, "nan"))
              except ValueError:
                  return "n/a"
              if not math.isfinite(value):
                  return "n/a"
              return f"{100.0 * value:.2f}%"

          effective_trial_cap = os.environ.get("MAX_TRIALS_PER_CLASS_PER_PARTICIPANT") or "all trials"
          if benchmark_preset == "final-all-trials":
              effective_trial_cap = "all trials"

          lines = [
              "# Stimulus cross-subject nested",
              "",
              "Nested leave-one-subject-out image-identity decoding using only `Part*Data.mat`.",
              "",
              "| metric | value |",
              "| --- | ---: |",
              f"| benchmark preset | {benchmark_preset} |",
              f"| effective trial cap | {effective_trial_cap} |",
              f"| output prefix | `{output_prefix}` |",
              f"| outer folds | {summary['n_outer_folds']} |",
              f"| candidates | {summary['n_candidates']} |",
              f"| outer evaluation mode | {summary.get('outer_evaluation_mode', 'single_best')} |",
              f"| selection ensemble size | {summary.get('selection_ensemble_size', os.environ.get('SELECTION_ENSEMBLE_SIZE', '1'))} |",
              f"| selection ensemble diversity | {summary.get('selection_ensemble_diversity', os.environ.get('SELECTION_ENSEMBLE_DIVERSITY', 'none'))} |",
              f"| ensemble score normalization | {summary.get('selection_ensemble_score_normalization', os.environ.get('SELECTION_ENSEMBLE_SCORE_NORMALIZATION', 'row_z_softmax'))} |",
              f"| selection ensemble weighting | {summary.get('selection_ensemble_weighting', os.environ.get('SELECTION_ENSEMBLE_WEIGHTING', 'uniform'))} |",
              f"| selection ensemble temperature | {summary.get('selection_ensemble_temperature', os.environ.get('SELECTION_ENSEMBLE_TEMPERATURE', '0.02'))} |",
              f"| selected ensemble candidate counts | {summary.get('selected_ensemble_candidate_counts', '')} |",
              f"| label shuffle control | {summary.get('label_shuffle_control', os.environ.get('LABEL_SHUFFLE_CONTROL', 'false'))} |",
              f"| label shuffle seed | {summary.get('label_shuffle_seed', os.environ.get('LABEL_SHUFFLE_SEED', ''))} |",
              f"| trial cap counts | {summary.get('max_trials_per_class_per_participant_counts', '')} |",
              f"| selected classifier counts | {summary.get('selected_classifier_counts', '')} |",
              f"| selected window center counts | {summary.get('selected_window_center_counts', '')} |",
              f"| selected feature mode counts | {summary.get('selected_feature_mode_counts', '')} |",
              f"| selected normalization counts | {summary.get('selected_normalization_counts', '')} |",
              f"| selected alignment counts | {summary.get('selected_alignment_counts', '')} |",
              f"| selected PCA component counts | {summary.get('selected_components_pca_counts', '')} |",
              f"| inner winner margin mean | {percent_summary('inner_winner_margin_mean')} |",
              f"| inner winner margin median | {percent_summary('inner_winner_margin_median')} |",
              f"| inner winner margin min | {percent_summary('inner_winner_margin_min')} |",
              f"| chance | {float(summary['chance_percent']):.2f}% |",
              f"| mean balanced accuracy | {float(summary['balanced_percent_mean']):.2f}% |",
              f"| balanced accuracy SEM | {float(summary['balanced_percent_sem']):.2f}% |",
              f"| top-2 accuracy | {float(summary['top2_percent_mean']):.2f}% |",
              f"| top-3 accuracy | {float(summary['top3_percent_mean']):.2f}% |",
              f"| mean true-label rank | {float(summary['mean_true_label_rank_mean']):.2f} |",
              f"| participants above chance | {summary['participants_above_chance']} |",
              f"| one-sided sign-flip p | {float(summary['one_sided_signflip_p_value']):.4g} |",
              "",
              "## Selected candidates",
              "",
              "| participant | candidate(s) | classifier | alignment | window center | inner balanced accuracy | winner margin |",
              "| ---: | --- | --- | --- | ---: | ---: | ---: |",
          ]
          for row in selected_rows:
              lines.append(
                  f"| {row['test_participant']} | {row.get('selected_candidate_indices', row['selected_candidate_index'])} | {row['selected_classifier']} | "
                  f"{row.get('selected_alignment', 'none')} | {float(row['selected_window_center_s']):.3f} | "
                  f"{100.0 * float(row['selected_inner_balanced_accuracy_mean']):.2f}% | "
                  f"{percent_row(row, 'selected_inner_winner_margin')} |"
              )
          if top_pairs:
              lines.extend([
                  "", "## Top bias-corrected confusion pairs", "",
                  "| stimulus A | stimulus B | observed errors | expected errors | lift | residual | participants |",
                  "| ---: | ---: | ---: | ---: | ---: | ---: | ---: |",
              ])
              for row in top_pairs:
                  lines.append(
                      f"| {row['stimulus_a']} | {row['stimulus_b']} | {row['total_confusions']} | "
                      f"{float(row['expected_total_confusions']):.1f} | {float(row['pair_confusion_lift']):.2f} | "
                      f"{float(row['pair_standardized_residual']):.2f} | {row['n_confused_participants']} |"
                  )
          if category_path.exists() and category_path.stat().st_size > 0:
              category_rows = list(csv.DictReader(category_path.open(newline="", encoding="utf-8")))
              lines.extend([
                  "", "## Confusion category enrichment", "",
                  "| category | same-category rate | expected rate | lift | residual | p | participants |",
                  "| --- | ---: | ---: | ---: | ---: | ---: | ---: |",
              ])
              for row in category_rows[:8]:
                  lines.append(
                      f"| {row['category_column']} | {100.0 * float(row['same_category_error_rate']):.2f}% | "
                      f"{100.0 * float(row['expected_same_category_error_rate']):.2f}% | "
                      f"{float(row['same_category_lift']):.2f} | "
                      f"{float(row['same_category_standardized_residual']):.2f} | "
                      f"{float(row['same_category_permutation_p_value']):.4g} | "
                      f"{row['n_participants_with_same_category_errors']}/{row['n_participants_with_category_errors']} |"
                  )
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload nested cross-subject outputs
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: stimulus-cross-subject-nested-outputs
          path: outputs/stimulus_cross_subject_nested_*.csv
          if-no-files-found: warn
