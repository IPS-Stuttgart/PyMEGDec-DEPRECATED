name: Manual stimulus cross-subject smoke
#checkov:skip=CKV_GHA_7:Manual workflow inputs are constrained to analysis parameters and used only after shell quoting.

on:
  workflow_dispatch:
    inputs:
      runner_type:
        description: Runner backend used for the full-data smoke benchmark.
        required: true
        default: github-hosted
        type: choice
        options:
          - github-hosted
          - self-hosted
      github_runner_label:
        description: GitHub-hosted runner label used when runner_type=github-hosted.
        required: true
        default: ubuntu-latest
        type: string
      self_hosted_runner_label:
        description: Self-hosted runner label used when runner_type=self-hosted.
        required: true
        default: self-hosted
        type: string
      python_version:
        description: Python version used for the analysis environment.
        required: true
        default: "3.13"
        type: string
      use_nextcloud_data:
        description: Restore/download/cache the MEG data before running.
        required: true
        default: true
        type: boolean
      data_cache_version:
        description: MEG data cache version.
        required: true
        default: v2
        type: string
      data_dir:
        description: Relative data directory to restore/populate.
        required: true
        default: .cache/meg-data-main
        type: string
      participants:
        description: Participant ids such as 1-4,6,8.
        required: true
        default: "1-4,6,8,9,10,13-27"
        type: string
      benchmark_mode:
        description: Named benchmark preset for output labels and default timing.
        required: true
        default: poststimulus
        type: choice
        options:
          - poststimulus
          - prestimulus-control
      analysis_kind:
        description: Fixed-pipeline analysis implementation.
        required: true
        default: standard
        type: choice
        options:
          - standard
          - mcca
      window_center:
        description: Stimulus decoding window center in seconds. Leave empty to use the benchmark-mode preset.
        required: false
        default: ""
        type: string
      window_size:
        description: Stimulus decoding window size in seconds.
        required: true
        default: "0.1"
        type: string
      baseline_window:
        description: Baseline normalization window as start,stop in seconds.
        required: true
        default: "-0.5,0.0"
        type: string
      feature_mode:
        description: Feature mode passed to the cross-subject smoke command.
        required: true
        default: sensor_flat
        type: choice
        options:
          - sensor_mean
          - sensor_flat
      normalization:
        description: Subject normalization mode.
        required: true
        default: subject_baseline_z
        type: choice
        options:
          - subject_baseline_z
          - subject_trial_z
          - subject_baseline_whiten
          - subject_z
          - none
      classifier:
        description: Classifier name.
        required: true
        default: multinomial-logistic
        type: string
      components_pca:
        description: Number of PCA components, or inf.
        required: true
        default: "64"
        type: string
      label_control:
        description: Optional training-label control for fixed-pipeline null benchmarks.
        required: true
        default: none
        type: choice
        options:
          - none
          - shuffle-within-subject
          - circular-shift-within-subject
      label_control_seed:
        description: Seed for fixed-pipeline training-label controls.
        required: true
        default: "0"
        type: string
      mcca_components:
        description: Number of M-CCA components, or inf. Used only when analysis_kind=mcca.
        required: true
        default: "64"
        type: string
      mcca_regularization:
        description: M-CCA ridge regularization. Used only when analysis_kind=mcca.
        required: true
        default: "1e-6"
        type: string
      mcca_subject_pca_components:
        description: Optional within-subject M-CCA rank cap; use none or inf. Used only when analysis_kind=mcca.
        required: true
        default: "128"
        type: string
      mcca_sample_mode:
        description: Class-aligned M-CCA row construction. Used only when analysis_kind=mcca.
        required: true
        default: class_repetition
        type: choice
        options:
          - class_mean
          - class_repetition
      target_calibration_trials_per_class:
        description: Labeled target trials per class used only for target projection calibration.
        required: true
        default: "0"
        type: string
      target_centering:
        description: Centering for calibration-free group M-CCA projection.
        required: true
        default: target_unsupervised
        type: choice
        options:
          - target_unsupervised
          - group_mean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  cross-subject-smoke:
    name: Cross-subject smoke
    runs-on: ${{ inputs.runner_type == 'github-hosted' && inputs.github_runner_label || inputs.self_hosted_runner_label }}
    timeout-minutes: 720
    env:
      DATA_DIR: ${{ inputs.data_dir }}
      USE_NEXTCLOUD_DATA: ${{ inputs.use_nextcloud_data }}
      DATA_CACHE_VERSION: ${{ inputs.data_cache_version }}
      PARTICIPANTS: ${{ inputs.participants }}
      BENCHMARK_MODE: ${{ inputs.benchmark_mode }}
      ANALYSIS_KIND: ${{ inputs.analysis_kind }}
      WINDOW_CENTER: ${{ inputs.window_center }}
      WINDOW_SIZE: ${{ inputs.window_size }}
      BASELINE_WINDOW: ${{ inputs.baseline_window }}
      FEATURE_MODE: ${{ inputs.feature_mode }}
      NORMALIZATION: ${{ inputs.normalization }}
      CLASSIFIER: ${{ inputs.classifier }}
      COMPONENTS_PCA: ${{ inputs.components_pca }}
      LABEL_CONTROL: ${{ inputs.label_control }}
      LABEL_CONTROL_SEED: ${{ inputs.label_control_seed }}
      MCCA_COMPONENTS: ${{ inputs.mcca_components }}
      MCCA_REGULARIZATION: ${{ inputs.mcca_regularization }}
      MCCA_SUBJECT_PCA_COMPONENTS: ${{ inputs.mcca_subject_pca_components }}
      MCCA_SAMPLE_MODE: ${{ inputs.mcca_sample_mode }}
      TARGET_CALIBRATION_TRIALS_PER_CLASS: ${{ inputs.target_calibration_trials_per_class }}
      TARGET_CENTERING: ${{ inputs.target_centering }}
      MAIN_FILE_NAMES: >-
        Part1Data.mat,Part2Data.mat,Part3Data.mat,Part4Data.mat,Part6Data.mat,
        Part8Data.mat,Part9Data.mat,Part10Data.mat,Part13Data.mat,Part14Data.mat,
        Part15Data.mat,Part16Data.mat,Part17Data.mat,Part18Data.mat,Part19Data.mat,
        Part20Data.mat,Part21Data.mat,Part22Data.mat,Part23Data.mat,Part24Data.mat,
        Part25Data.mat,Part26Data.mat,Part27Data.mat

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare main MEG data
        if: ${{ env.USE_NEXTCLOUD_DATA == 'true' }}
        timeout-minutes: 90
        uses: ./.github/actions/prepare-meg-data
        with:
          data-dir: ${{ env.DATA_DIR }}
          cache-version: ${{ env.DATA_CACHE_VERSION }}
          cache-key: meg-data-main-${{ runner.os }}-${{ env.DATA_CACHE_VERSION }}
          file-names: ${{ env.MAIN_FILE_NAMES }}
          require-cue-files: "false"
          expected-main-files: "23"
          webdav-url: ${{ secrets.BUSHMEG_WEBDAV_URL }}
          webdav-user: ${{ secrets.BUSHMEG_DATA_KEY }}
          webdav-password: ${{ secrets.BUSHMEG_DATA_PASSWORD }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install package
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Validate main data files
        shell: bash
        run: |
          set -euo pipefail
          main_count="$(find -L "${DATA_DIR}" -name 'Part*Data.mat' ! -name 'Part*CueData.mat' | wc -l | tr -d ' ')"
          echo "Main files: ${main_count}"
          test "${main_count}" -ge 23

      - name: Run fixed-pipeline cross-subject smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p outputs
          analysis_label="${BENCHMARK_MODE//-/_}"
          if [[ "${BENCHMARK_MODE}" == "prestimulus-control" ]]; then
            default_window_center="-0.175"
          else
            default_window_center="0.175"
          fi
          window_center="${WINDOW_CENTER:-${default_window_center}}"
          if [[ "${LABEL_CONTROL}" != "none" ]]; then
            analysis_label="${analysis_label}_${LABEL_CONTROL//-/_}"
          fi
          if [[ "${ANALYSIS_KIND}" == "mcca" ]]; then
            analysis_label="${analysis_label}_mcca"
            args=(
              python -m pymegdec.stimulus_mcca
              --data-dir "${DATA_DIR}"
              --participants "${PARTICIPANTS}"
              --window-center "${window_center}"
              --window-size "${WINDOW_SIZE}"
              --baseline-window="${BASELINE_WINDOW}"
              --feature-mode "${FEATURE_MODE}"
              --normalization "${NORMALIZATION}"
              --classifier "${CLASSIFIER}"
              --components-pca "${COMPONENTS_PCA}"
              --mcca-components "${MCCA_COMPONENTS}"
              --mcca-regularization "${MCCA_REGULARIZATION}"
              --mcca-subject-pca-components "${MCCA_SUBJECT_PCA_COMPONENTS}"
              --mcca-sample-mode "${MCCA_SAMPLE_MODE}"
              --target-calibration-trials-per-class "${TARGET_CALIBRATION_TRIALS_PER_CLASS}"
              --target-centering "${TARGET_CENTERING}"
              --outer-output "outputs/stimulus_cross_subject_${analysis_label}_outer.csv"
              --summary-output "outputs/stimulus_cross_subject_${analysis_label}_group_summary.csv"
              --predictions-output "outputs/stimulus_cross_subject_${analysis_label}_predictions.csv"
              --confusion-output "outputs/stimulus_cross_subject_${analysis_label}_confusion.csv"
              --per-stimulus-output "outputs/stimulus_cross_subject_${analysis_label}_per_stimulus.csv"
              --confusion-pairs-output "outputs/stimulus_cross_subject_${analysis_label}_confusion_pairs.csv"
            )
            "${args[@]}"
          else
            python scripts/export_stimulus_cross_subject_smoke_controlled.py \
              --data-dir "${DATA_DIR}" \
              --participants "${PARTICIPANTS}" \
              --window-center "${window_center}" \
              --window-size "${WINDOW_SIZE}" \
              --baseline-window="${BASELINE_WINDOW}" \
              --feature-mode "${FEATURE_MODE}" \
              --normalization "${NORMALIZATION}" \
              --classifier "${CLASSIFIER}" \
              --components-pca "${COMPONENTS_PCA}" \
              --label-control "${LABEL_CONTROL}" \
              --label-control-seed "${LABEL_CONTROL_SEED}" \
              --outer-output "outputs/stimulus_cross_subject_${analysis_label}_outer.csv" \
              --summary-output "outputs/stimulus_cross_subject_${analysis_label}_group_summary.csv" \
              --predictions-output "outputs/stimulus_cross_subject_${analysis_label}_predictions.csv" \
              --confusion-output "outputs/stimulus_cross_subject_${analysis_label}_confusion.csv" \
              --per-stimulus-output "outputs/stimulus_cross_subject_${analysis_label}_per_stimulus.csv" \
              --confusion-pairs-output "outputs/stimulus_cross_subject_${analysis_label}_confusion_pairs.csv"
          fi

      - name: Append workflow summary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import os
          from pathlib import Path

          benchmark_mode = os.environ["BENCHMARK_MODE"]
          analysis_kind = os.environ.get("ANALYSIS_KIND", "standard") or "standard"
          label_control = os.environ.get("LABEL_CONTROL", "none") or "none"
          analysis_label = benchmark_mode.replace("-", "_")
          if label_control != "none":
              analysis_label = f"{analysis_label}_{label_control.replace('-', '_')}"
          if analysis_kind == "mcca":
              analysis_label = f"{analysis_label}_mcca"
          summary_path = Path(f"outputs/stimulus_cross_subject_{analysis_label}_group_summary.csv")
          outer_path = Path(f"outputs/stimulus_cross_subject_{analysis_label}_outer.csv")
          pairs_path = Path(f"outputs/stimulus_cross_subject_{analysis_label}_confusion_pairs.csv")
          summary = next(csv.DictReader(summary_path.open(newline="", encoding="utf-8")))
          outer_rows = list(csv.DictReader(outer_path.open(newline="", encoding="utf-8")))
          best = sorted(outer_rows, key=lambda row: float(row["balanced_accuracy"]), reverse=True)[:5]
          worst = sorted(outer_rows, key=lambda row: float(row["balanced_accuracy"]))[:5]
          pair_rows = list(csv.DictReader(pairs_path.open(newline="", encoding="utf-8"))) if pairs_path.exists() else []
          top_pairs = sorted(pair_rows, key=lambda row: float(row.get("pair_standardized_residual") or row["total_confusions"]), reverse=True)[:5]

          lines = [
              f"# Stimulus cross-subject smoke: {benchmark_mode}",
              "",
              "Fixed-pipeline leave-one-subject-out image-identity decoding using only `Part*Data.mat`.",
              "",
              "| metric | value |",
              "| --- | ---: |",
              f"| benchmark mode | {benchmark_mode} |",
              f"| analysis kind | {analysis_kind} |",
              f"| analysis label | {analysis_label} |",
              f"| label control | {summary.get('label_control', label_control)} |",
              f"| label control seed | {summary.get('label_control_seed', os.environ.get('LABEL_CONTROL_SEED', ''))} |",
              f"| training labels controlled | {summary.get('training_labels_controlled', str(label_control != 'none').lower())} |",
              f"| folds | {summary['n_outer_folds']} |",
              f"| window center | {float(summary['window_center_s']):.3f} s |",
              f"| chance | {float(summary['chance_percent']):.2f}% |",
              f"| mean balanced accuracy | {float(summary['balanced_percent_mean']):.2f}% |",
              f"| balanced accuracy SEM | {float(summary['balanced_percent_sem']):.2f}% |",
              f"| top-2 accuracy | {float(summary['top2_percent_mean']):.2f}% |",
              f"| top-3 accuracy | {float(summary['top3_percent_mean']):.2f}% |",
              f"| mean true-label rank | {float(summary['mean_true_label_rank_mean']):.2f} |",
              f"| participants above chance | {summary['participants_above_chance']} |",
              f"| one-sided sign-flip p | {float(summary['one_sided_signflip_p_value']):.4g} |",
              "",
              "## Best held-out participants",
              "",
              "| participant | balanced accuracy | raw accuracy |",
              "| ---: | ---: | ---: |",
          ]
          for row in best:
              lines.append(f"| {row['test_participant']} | {100.0 * float(row['balanced_accuracy']):.2f}% | {100.0 * float(row['accuracy']):.2f}% |")
          lines.extend(["", "## Worst held-out participants", "", "| participant | balanced accuracy | raw accuracy |", "| ---: | ---: | ---: |"])
          for row in worst:
              lines.append(f"| {row['test_participant']} | {100.0 * float(row['balanced_accuracy']):.2f}% | {100.0 * float(row['accuracy']):.2f}% |")
          if top_pairs:
              lines.extend(
                  [
                      "",
                      "## Top bias-corrected confusion pairs",
                      "",
                      "| stimulus A | stimulus B | observed errors | expected errors | lift | residual | participants |",
                      "| ---: | ---: | ---: | ---: | ---: | ---: | ---: |",
                  ]
              )
              for row in top_pairs:
                  lines.append(
                      f"| {row['stimulus_a']} | {row['stimulus_b']} | {row['total_confusions']} | "
                      f"{float(row['expected_total_confusions']):.1f} | {float(row['pair_confusion_lift']):.2f} | "
                      f"{float(row['pair_standardized_residual']):.2f} | {row['n_confused_participants']} |"
                  )
          Path(__import__("os").environ["GITHUB_STEP_SUMMARY"]).write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload cross-subject smoke outputs
        uses: actions/upload-artifact@v7
        with:
          name: stimulus-cross-subject-smoke-outputs
          path: outputs/stimulus_cross_subject_*.csv
