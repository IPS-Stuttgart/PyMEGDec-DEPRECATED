name: Manual stimulus artifact ensemble

on:
  workflow_dispatch:
    inputs:
      compact_run_id:
        description: Compact PCA160/C0.3-C0.5 run id.
        required: true
        default: "26870015355"
        type: string
      small_finetune_run_id:
        description: Small finetune run id.
        required: true
        default: "26742761615"
        type: string
      w150_pca128_run_id:
        description: w150 PCA128-family run id.
        required: true
        default: "26710557909"
        type: string
      w125_run_id:
        description: w125 run id.
        required: true
        default: "26710553971"
        type: string
      artifact_name:
        description: Name of the aggregate artifact to download from each run.
        required: true
        default: nested-matrix-aggregate
        type: string
      aggregation_modes:
        description: Comma-separated artifact aggregation modes to compare.
        required: true
        default: auto,hard_vote,mean_score,confidence_weighted_mean_score,entropy_weighted_mean_score,agreement_weighted_mean_score,log_score_mean,score_rank_fusion,reciprocal_rank_fusion,mean_rank,borda,score_tiebreak_first_source,balanced_assignment,balanced_assignment_shrink25,balanced_assignment_shrink50,balanced_assignment_shrink75,uniform_prior_shift,uniform_prior_shift_shrink25,uniform_prior_shift_shrink50,uniform_prior_shift_shrink75
        type: string
      score_normalizations:
        description: Comma-separated per-source score normalizations to compare before score aggregation.
        required: true
        default: raw,rank_softmax,z_softmax
        type: string
      nested_selection_metrics:
        description: Comma-separated leave-subject-out selector metrics to compare.
        required: true
        default: balanced_accuracy,balanced_top2_top3_rank_lcb
        type: string
      nested_weight_selector_ensemble:
        description: Multi-source ensemble to optimize with leakage-safe leave-subject-out source-weight selection.
        required: true
        default: compact_small_finetune_w150_pca128
        type: string
      nested_weight_grid_step:
        description: Simplex grid step for nested source-weight selection.
        required: true
        default: "0.25"
        type: string

permissions:
  contents: read
  actions: read

jobs:
  artifact-ensemble:
    name: Artifact-level prediction ensemble
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Download aggregate artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
          COMPACT_RUN_ID: ${{ inputs.compact_run_id }}
          SMALL_FINETUNE_RUN_ID: ${{ inputs.small_finetune_run_id }}
          W150_PCA128_RUN_ID: ${{ inputs.w150_pca128_run_id }}
          W125_RUN_ID: ${{ inputs.w125_run_id }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh run download "${COMPACT_RUN_ID}" -n "${ARTIFACT_NAME}" -D artifacts/compact
          gh run download "${SMALL_FINETUNE_RUN_ID}" -n "${ARTIFACT_NAME}" -D artifacts/small_finetune
          gh run download "${W150_PCA128_RUN_ID}" -n "${ARTIFACT_NAME}" -D artifacts/w150_pca128
          gh run download "${W125_RUN_ID}" -n "${ARTIFACT_NAME}" -D artifacts/w125

      - name: Combine predictions
        env:
          AGGREGATION_MODES: ${{ inputs.aggregation_modes }}
          SCORE_NORMALIZATIONS: ${{ inputs.score_normalizations }}
          NESTED_SELECTION_METRICS: ${{ inputs.nested_selection_metrics }}
          NESTED_WEIGHT_SELECTOR_ENSEMBLE: ${{ inputs.nested_weight_selector_ensemble }}
          NESTED_WEIGHT_GRID_STEP: ${{ inputs.nested_weight_grid_step }}
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -r -a modes <<< "${AGGREGATION_MODES}"
          IFS=',' read -r -a normalizations <<< "${SCORE_NORMALIZATIONS}"
          IFS=',' read -r -a selection_metrics <<< "${NESTED_SELECTION_METRICS}"
          for raw_normalization in "${normalizations[@]}"; do
            normalization="$(echo "${raw_normalization}" | xargs)"
            if [[ -z "${normalization}" ]]; then
              continue
            fi
            normalization_slug="${normalization//-/_}"
            for raw_mode in "${modes[@]}"; do
              mode="$(echo "${raw_mode}" | xargs)"
              if [[ -z "${mode}" ]]; then
                continue
              fi
              mode_slug="${mode//-/_}"
              for raw_metric in "${selection_metrics[@]}"; do
                metric="$(echo "${raw_metric}" | xargs)"
                if [[ -z "${metric}" ]]; then
                  continue
                fi
                stem="artifact_ensemble_${normalization_slug}_${mode_slug}"
                selector_name="nested_subject_selector"
                if [[ "${normalization}" != "raw" ]]; then
                  selector_name="nested_subject_selector_${normalization_slug}"
                fi
                if [[ "${metric}" != "balanced_accuracy" ]]; then
                  metric_slug="${metric//-/_}"
                  stem="${stem}_${metric_slug}"
                  selector_name="${selector_name}_${metric_slug}"
                fi
                python -m pymegdec.stimulus_artifact_ensemble \
                  --source compact=artifacts/compact \
                  --source small_finetune=artifacts/small_finetune \
                  --source w150_pca128=artifacts/w150_pca128 \
                  --source w125=artifacts/w125 \
                  --ensemble compact=compact \
                  --ensemble compact_small_finetune=compact,small_finetune \
                  --ensemble compact_w150_pca128=compact,w150_pca128 \
                  --ensemble compact_w125=compact,w125 \
                  --ensemble compact_small_finetune_w150_pca128=compact,small_finetune,w150_pca128 \
                  --key-column test_participant \
                  --key-column test_trial_index \
                  --key-column true_label \
                  --nested-selector-name "${selector_name}" \
                  --nested-selection-metric "${metric}" \
                  --nested-weight-selector-name nested_weight_selector \
                  --nested-weight-selector-ensemble "${NESTED_WEIGHT_SELECTOR_ENSEMBLE}" \
                  --nested-weight-grid-step "${NESTED_WEIGHT_GRID_STEP}" \
                  --score-normalization "${normalization}" \
                  --aggregation-mode "${mode}" \
                  --output-dir outputs \
                  --output-stem "${stem}"
              done
            done
          done

      - name: Build sorted ensemble leaderboard
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import math
          from pathlib import Path

          rows = []
          for path in sorted(Path("outputs").glob("*_group_summary.csv")):
              with path.open(newline="", encoding="utf-8") as handle:
                  for row in csv.DictReader(handle):
                      row = dict(row)
                      row["source_summary_file"] = path.name
                      rows.append(row)

          def as_float(row, key):
              try:
                  return float(row.get(key, ""))
              except (TypeError, ValueError):
                  return float("nan")

          rows.sort(
              key=lambda row: (
                  as_float(row, "balanced_accuracy_mean"),
                  as_float(row, "top2_accuracy_mean"),
                  as_float(row, "top3_accuracy_mean"),
                  -as_float(row, "mean_true_label_rank_mean"),
              ),
              reverse=True,
          )

          fieldnames = []
          for row in rows:
              for key in row:
                  if key not in fieldnames:
                      fieldnames.append(key)

          output_csv = Path("outputs/artifact_ensemble_leaderboard.csv")
          with output_csv.open("w", newline="", encoding="utf-8") as handle:
              writer = csv.DictWriter(handle, fieldnames=fieldnames)
              writer.writeheader()
              writer.writerows(rows)

          output_md = Path("outputs/artifact_ensemble_leaderboard.md")
          lines = [
              "# Artifact Ensemble Leaderboard",
              "",
              "| rank | ensemble | mode | score norm | selector metric | balanced | top-2 | top-3 | mean rank | source file |",
              "| ---: | --- | --- | --- | --- | ---: | ---: | ---: | ---: | --- |",
          ]
          for rank, row in enumerate(rows[:25], start=1):
              balanced = as_float(row, "balanced_accuracy_mean")
              top2 = as_float(row, "top2_accuracy_mean")
              top3 = as_float(row, "top3_accuracy_mean")
              mean_rank = as_float(row, "mean_true_label_rank_mean")
              lines.append(
                  "| {rank} | {ensemble} | {mode} | {norm} | {metric} | {balanced:.2f}% | {top2:.2f}% | {top3:.2f}% | {mean_rank:.3f} | {source} |".format(
                      rank=rank,
                      ensemble=row.get("artifact_ensemble", ""),
                      mode=row.get("artifact_ensemble_requested_aggregation_mode", ""),
                      norm=row.get("artifact_ensemble_score_normalization", ""),
                      metric=row.get("selection_metric_name", ""),
                      balanced=100.0 * balanced if math.isfinite(balanced) else math.nan,
                      top2=100.0 * top2 if math.isfinite(top2) else math.nan,
                      top3=100.0 * top3 if math.isfinite(top3) else math.nan,
                      mean_rank=mean_rank,
                      source=row.get("source_summary_file", ""),
                  )
              )
          output_md.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Append comparison summary
        shell: bash
        run: |
          set -euo pipefail
          cat outputs/artifact_ensemble_leaderboard.md >> "${GITHUB_STEP_SUMMARY}"
          printf '\n\n' >> "${GITHUB_STEP_SUMMARY}"
          for summary in outputs/*_comparison.md; do
            cat "${summary}" >> "${GITHUB_STEP_SUMMARY}"
            printf '\n\n' >> "${GITHUB_STEP_SUMMARY}"
          done

      - name: Upload artifact ensemble outputs
        uses: actions/upload-artifact@v7
        with:
          name: stimulus-artifact-ensemble
          path: outputs/*
          if-no-files-found: error
