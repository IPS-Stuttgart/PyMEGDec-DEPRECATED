name: Python Tests

permissions:
  contents: read
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-minimal:
    name: Unit tests without optional ML deps (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry env use python
          poetry install

      - name: Run fast tests
        run: poetry run python -m unittest discover -v

  unit-ml-extras:
    name: Unit tests with optional ML deps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package with optional ML dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry env use python
          poetry install --extras "ml"

      - name: Run fast tests
        run: poetry run python -m unittest discover -v

  integration:
    runs-on: ubuntu-latest
    env:
      DOWNLOAD_URL: ${{ secrets.DOWNLOAD_URL }}
      DOWNLOAD_URL_CUE: ${{ secrets.DOWNLOAD_URL_CUE }}
      PYMEGDEC_DATA_DIR: data
      PYMEGDEC_REQUIRE_DATA: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package with optional ML dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry env use python
          poetry install --extras "ml"

      - name: Check data secrets
        id: data-secrets
        run: |
          if [ -n "$DOWNLOAD_URL" ] && [ -n "$DOWNLOAD_URL_CUE" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache downloaded data
        if: steps.data-secrets.outputs.available == 'true'
        id: cache-data
        uses: actions/cache@v5
        with:
          path: data
          key: ${{ runner.os }}-meg-data

      - name: Download data
        if: steps.data-secrets.outputs.available == 'true' && steps.cache-data.outputs.cache-hit != 'true'
        run: |
          mkdir -p data
          cd data
          wget -q "$DOWNLOAD_URL"
          wget -q "$DOWNLOAD_URL_CUE"

      - name: Run MEG data integration tests
        if: steps.data-secrets.outputs.available == 'true'
        run: poetry run python -m unittest tests.test_cross_validation tests.test_model_transfer

      - name: Skip MEG data integration tests
        if: steps.data-secrets.outputs.available != 'true'
        run: echo "Skipping integration tests because DOWNLOAD_URL and DOWNLOAD_URL_CUE are not configured."
