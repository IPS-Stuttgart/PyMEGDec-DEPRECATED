name: Python Tests

permissions:
  contents: read
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-minimal:
    name: Unit tests without optional ML deps (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry env use python
          poetry install

      - name: Run fast tests
        run: poetry run python -m unittest discover -v

  unit-ml-extras:
    name: Unit tests with optional ML deps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package with optional CPU ML dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry env use python
          poetry install
          poetry run python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          poetry run python -m pip install pytorch-lightning "xgboost<2.1"

      - name: Run fast tests
        run: poetry run python -m unittest discover -v

  integration:
    runs-on: ubuntu-latest
    env:
      BUSHMEG_WEBDAV_URL: ${{ secrets.BUSHMEG_WEBDAV_URL }}
      BUSHMEG_DATA_KEY: ${{ secrets.BUSHMEG_DATA_KEY }}
      BUSHMEG_DATA_PASSWORD: ${{ secrets.BUSHMEG_DATA_PASSWORD }}
      PYMEGDEC_DATA_DIR: data
      PYMEGDEC_REQUIRE_DATA: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package with optional CPU ML dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry env use python
          poetry install
          poetry run python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          poetry run python -m pip install pytorch-lightning "xgboost<2.1"

      - name: Check data secrets
        id: data-secrets
        run: |
          if [ -n "$BUSHMEG_WEBDAV_URL" ] && [ -n "$BUSHMEG_DATA_KEY" ] && [ -n "$BUSHMEG_DATA_PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare sample MEG data
        if: steps.data-secrets.outputs.available == 'true'
        uses: ./.github/actions/prepare-meg-data
        with:
          data-dir: data
          cache-key: ${{ runner.os }}-bushmeg-sample-data-v2
          file-names: Part2CueData.mat,Part2Data.mat
          webdav-url: ${{ secrets.BUSHMEG_WEBDAV_URL }}
          webdav-user: ${{ secrets.BUSHMEG_DATA_KEY }}
          webdav-password: ${{ secrets.BUSHMEG_DATA_PASSWORD }}

      - name: Run MEG data integration tests
        if: steps.data-secrets.outputs.available == 'true'
        run: poetry run python -m unittest tests.test_cross_validation tests.test_model_transfer

      - name: Skip MEG data integration tests
        if: steps.data-secrets.outputs.available != 'true'
        run: echo "Skipping integration tests because BUSHMEG_WEBDAV_URL, BUSHMEG_DATA_KEY, and BUSHMEG_DATA_PASSWORD are not configured."
