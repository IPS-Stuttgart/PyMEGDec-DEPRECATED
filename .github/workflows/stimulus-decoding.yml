name: Manual stimulus decoding

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: Python version used for the analysis environment.
        required: true
        default: "3.13"
        type: string
      use_nextcloud_data:
        description: Restore/download/cache the MEG data before running.
        required: true
        default: true
        type: boolean
      data_cache_version:
        description: MEG data cache version. Bump to force a fresh cache.
        required: true
        default: v2
        type: string
      data_dir:
        description: Relative data directory to restore/populate.
        required: true
        default: .cache/meg-data-all
        type: string
      participants:
        description: Participant ids for a single unsharded run. Ignored when participant_batches is non-empty.
        required: false
        default: ""
        type: string
      participant_batches:
        description: Semicolon-separated participant batches.
        required: false
        default: "1-4;6,8,9,10;13-16;17-20;21;22;23;24;25;26;27"
        type: string
      time_window:
        description: Window-center range as start,stop in seconds.
        required: true
        default: "-0.4,0.8"
        type: string
      window_step_s:
        description: Step between time-window centers in seconds.
        required: true
        default: "0.025"
        type: string
      diagnostic_window_centers:
        description: Comma-separated window centers for confusion and per-stimulus diagnostics. Leave empty to disable.
        required: false
        default: "0.15,0.2,0.25"
        type: string
      window_size:
        description: Window size in seconds.
        required: true
        default: "0.1"
        type: string
      transfer_direction:
        description: Train/validation dataset direction.
        required: true
        default: main-to-cue
        type: choice
        options:
          - main-to-cue
          - cue-to-main
      classifier:
        description: Classifier name passed to pymegdec-stimulus-decoding.
        required: true
        default: multiclass-svm
        type: choice
        options:
          - multiclass-svm
          - multiclass-svm-weighted
          - random-forest
          - gradient-boosting
          - knn
          - mostFrequentDummy
          - always1Dummy
          - xgboost
          - scikit-mlp
          - pytorch-mlp
      classifier_param:
        description: Optional classifier parameter, JSON/Python literal/numeric value, or empty.
        required: false
        default: ""
        type: string
      components_pca:
        description: Number of PCA components, or inf.
        required: true
        default: "100"
        type: string
      frequency_low:
        description: Lower frequency bound in Hz.
        required: true
        default: "0"
        type: string
      frequency_high:
        description: Upper frequency bound in Hz, or inf.
        required: true
        default: inf
        type: string
      chance_classes:
        description: Number of stimulus classes used for the chance line.
        required: true
        default: "16"
        type: string
      permutations:
        description: Number of label shuffles per participant/window for permutation p-values.
        required: true
        default: "1000"
        type: string
      permutation_seed:
        description: Seed for permutation label shuffles.
        required: true
        default: "42"
        type: string
      install_extra:
        description: Optional dependency extra to install.
        required: true
        default: none
        type: choice
        options:
          - none
          - xgboost
          - torch
          - all
      output_prefix:
        description: Prefix for output CSVs and plot directory under outputs/.
        required: true
        default: stimulus_decoding
        type: string
      fail_if_missing_data:
        description: Fail if data_dir does not exist after optional cache restore/download.
        required: true
        default: true
        type: boolean
      max_parallel:
        description: Maximum number of participant-batch jobs to run concurrently.
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"

permissions:
  contents: read

jobs:
  prepare-inputs:
    name: Validate inputs and prepare participant batches
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.validate.outputs.batches }}
      python_version: ${{ steps.validate.outputs.python_version }}
      use_nextcloud_data: ${{ steps.validate.outputs.use_nextcloud_data }}
      data_cache_version: ${{ steps.validate.outputs.data_cache_version }}
      data_dir: ${{ steps.validate.outputs.data_dir }}
      time_window: ${{ steps.validate.outputs.time_window }}
      window_step_s: ${{ steps.validate.outputs.window_step_s }}
      diagnostic_window_centers: ${{ steps.validate.outputs.diagnostic_window_centers }}
      window_size: ${{ steps.validate.outputs.window_size }}
      transfer_direction: ${{ steps.validate.outputs.transfer_direction }}
      classifier: ${{ steps.validate.outputs.classifier }}
      classifier_param: ${{ steps.validate.outputs.classifier_param }}
      components_pca: ${{ steps.validate.outputs.components_pca }}
      frequency_low: ${{ steps.validate.outputs.frequency_low }}
      frequency_high: ${{ steps.validate.outputs.frequency_high }}
      chance_classes: ${{ steps.validate.outputs.chance_classes }}
      permutations: ${{ steps.validate.outputs.permutations }}
      permutation_seed: ${{ steps.validate.outputs.permutation_seed }}
      install_extra: ${{ steps.validate.outputs.install_extra }}
      output_prefix: ${{ steps.validate.outputs.output_prefix }}
      fail_if_missing_data: ${{ steps.validate.outputs.fail_if_missing_data }}
      max_parallel: ${{ steps.validate.outputs.max_parallel }}

    steps:
      - name: Validate manual inputs
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from __future__ import annotations

          import json
          import math
          import os
          import re
          from pathlib import Path, PurePosixPath

          DEFAULTS = {
              "python_version": "3.13",
              "use_nextcloud_data": "true",
              "data_cache_version": "v2",
              "data_dir": ".cache/meg-data-all",
              "participants": "",
              "participant_batches": "1-4;6,8,9,10;13-16;17-20;21;22;23;24;25;26;27",
              "time_window": "-0.4,0.8",
              "window_step_s": "0.025",
              "diagnostic_window_centers": "0.15,0.2,0.25",
              "window_size": "0.1",
              "transfer_direction": "main-to-cue",
              "classifier": "multiclass-svm",
              "classifier_param": "",
              "components_pca": "100",
              "frequency_low": "0",
              "frequency_high": "inf",
              "chance_classes": "16",
              "permutations": "1000",
              "permutation_seed": "42",
              "install_extra": "none",
              "output_prefix": "stimulus_decoding",
              "fail_if_missing_data": "true",
              "max_parallel": "2",
          }
          ALLOWED_CLASSIFIERS = {
              "multiclass-svm",
              "multiclass-svm-weighted",
              "random-forest",
              "gradient-boosting",
              "knn",
              "mostFrequentDummy",
              "always1Dummy",
              "xgboost",
              "scikit-mlp",
              "pytorch-mlp",
          }
          ALLOWED_EXTRAS = {"none", "xgboost", "torch", "all"}
          ALLOWED_TRANSFER_DIRECTIONS = {"main-to-cue", "cue-to-main"}

          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8"))
          raw_inputs = event.get("inputs", {})

          def raw_value(name: str) -> str:
              value = raw_inputs.get(name, DEFAULTS[name])
              if value is None:
                  value = DEFAULTS[name]
              value = str(value).strip()
              if value == "" and name not in {"participants", "participant_batches", "classifier_param", "diagnostic_window_centers"}:
                  value = DEFAULTS[name]
              if any(char in value for char in "\x00\n\r"):
                  raise SystemExit(f"Input {name!r} may not contain control characters or newlines.")
              return value

          def normalize_bool(name: str) -> str:
              value = raw_value(name).lower()
              if value in {"true", "1", "yes"}:
                  return "true"
              if value in {"false", "0", "no"}:
                  return "false"
              raise SystemExit(f"Input {name!r} must be boolean.")

          def require_match(name: str, pattern: str, *, max_len: int = 128) -> str:
              value = raw_value(name)
              if len(value) > max_len or not re.fullmatch(pattern, value):
                  raise SystemExit(f"Input {name!r} has invalid characters or length.")
              return value

          def normalize_int(name: str, *, minimum: int, maximum: int) -> str:
              value = require_match(name, r"[0-9]+", max_len=12)
              parsed = int(value)
              if not minimum <= parsed <= maximum:
                  raise SystemExit(f"Input {name!r} must be between {minimum} and {maximum}.")
              return str(parsed)

          def normalize_float(name: str, *, minimum: float | None = None, allow_inf: bool = False) -> str:
              value = raw_value(name).lower()
              if allow_inf and value == "inf":
                  return "inf"
              if not re.fullmatch(r"[-+]?(?:[0-9]+(?:\.[0-9]*)?|\.[0-9]+)(?:[eE][-+]?[0-9]+)?", value):
                  raise SystemExit(f"Input {name!r} must be a finite number" + (" or inf." if allow_inf else "."))
              parsed = float(value)
              if minimum is not None and parsed < minimum:
                  raise SystemExit(f"Input {name!r} must be >= {minimum}.")
              return format(parsed, ".12g")

          def normalize_time_window() -> str:
              value = raw_value("time_window")
              match = re.fullmatch(r"\s*([-+]?(?:[0-9]+(?:\.[0-9]*)?|\.[0-9]+)(?:[eE][-+]?[0-9]+)?)\s*,\s*([-+]?(?:[0-9]+(?:\.[0-9]*)?|\.[0-9]+)(?:[eE][-+]?[0-9]+)?)\s*", value)
              if not match:
                  raise SystemExit("Input 'time_window' must have the form start,stop.")
              start = float(match.group(1))
              stop = float(match.group(2))
              if not start < stop:
                  raise SystemExit("Input 'time_window' start must be smaller than stop.")
              if start < -10 or stop > 10:
                  raise SystemExit("Input 'time_window' must stay within [-10, 10] seconds.")
              return f"{start:.12g},{stop:.12g}"

          def normalize_float_list(name: str, *, minimum: float | None = None, maximum: float | None = None) -> str:
              value = raw_value(name).replace(" ", "")
              if value == "":
                  return ""
              if len(value) > 256:
                  raise SystemExit(f"Input {name!r} is too long.")
              values = []
              for token in value.split(","):
                  if not token:
                      raise SystemExit(f"Input {name!r} has an empty item.")
                  if not re.fullmatch(r"[-+]?(?:[0-9]+(?:\.[0-9]*)?|\.[0-9]+)(?:[eE][-+]?[0-9]+)?", token):
                      raise SystemExit(f"Input {name!r} must contain only finite comma-separated numbers.")
                  parsed = float(token)
                  if minimum is not None and parsed < minimum:
                      raise SystemExit(f"Input {name!r} values must be >= {minimum}.")
                  if maximum is not None and parsed > maximum:
                      raise SystemExit(f"Input {name!r} values must be <= {maximum}.")
                  values.append(format(parsed, ".12g"))
              return ",".join(values)

          def normalize_data_dir() -> str:
              value = require_match("data_dir", r"[A-Za-z0-9._/-]+", max_len=160)
              path = PurePosixPath(value)
              if path.is_absolute() or ".." in path.parts:
                  raise SystemExit("Input 'data_dir' must be a relative path without '..'.")
              return value.rstrip("/") or DEFAULTS["data_dir"]

          def normalize_participant_spec(name: str, *, allow_semicolon: bool) -> str:
              value = raw_value(name).replace(" ", "")
              pattern = r"[0-9,;\-]*" if allow_semicolon else r"[0-9,\-]*"
              if len(value) > 256 or not re.fullmatch(pattern, value):
                  raise SystemExit(f"Input {name!r} must contain only digits, ranges, commas" + (", and semicolons." if allow_semicolon else "."))
              return value

          def normalize_components() -> str:
              if raw_value("components_pca").lower() == "inf":
                  return "inf"
              return normalize_int("components_pca", minimum=1, maximum=100000)

          def normalize_classifier_param() -> str:
              value = raw_value("classifier_param")
              if value and (len(value) > 300 or not re.fullmatch(r"[A-Za-z0-9_.,:{}\[\]\"' +\-eE]*", value)):
                  raise SystemExit("Input 'classifier_param' contains unsupported characters.")
              return value

          sanitized = {
              "python_version": require_match("python_version", r"[0-9]+(?:\.[0-9]+){0,2}", max_len=16),
              "use_nextcloud_data": normalize_bool("use_nextcloud_data"),
              "data_cache_version": require_match("data_cache_version", r"[A-Za-z0-9._-]+", max_len=64),
              "data_dir": normalize_data_dir(),
              "participants": normalize_participant_spec("participants", allow_semicolon=False),
              "participant_batches": normalize_participant_spec("participant_batches", allow_semicolon=True),
              "time_window": normalize_time_window(),
              "window_step_s": normalize_float("window_step_s", minimum=0.001),
              "diagnostic_window_centers": normalize_float_list("diagnostic_window_centers", minimum=-10.0, maximum=10.0),
              "window_size": normalize_float("window_size", minimum=0.001),
              "transfer_direction": require_match("transfer_direction", r"[A-Za-z0-9_-]+", max_len=32),
              "classifier": require_match("classifier", r"[A-Za-z0-9_-]+", max_len=64),
              "classifier_param": normalize_classifier_param(),
              "components_pca": normalize_components(),
              "frequency_low": normalize_float("frequency_low", minimum=0.0),
              "frequency_high": normalize_float("frequency_high", minimum=0.0, allow_inf=True),
              "chance_classes": normalize_int("chance_classes", minimum=2, maximum=10000),
              "permutations": normalize_int("permutations", minimum=0, maximum=100000),
              "permutation_seed": normalize_int("permutation_seed", minimum=0, maximum=4294967295),
              "install_extra": require_match("install_extra", r"[A-Za-z0-9_-]+", max_len=32),
              "output_prefix": require_match("output_prefix", r"[A-Za-z0-9_.-]+", max_len=80),
              "fail_if_missing_data": normalize_bool("fail_if_missing_data"),
              "max_parallel": normalize_int("max_parallel", minimum=1, maximum=4),
          }
          if sanitized["classifier"] not in ALLOWED_CLASSIFIERS:
              raise SystemExit("Unsupported classifier.")
          if sanitized["transfer_direction"] not in ALLOWED_TRANSFER_DIRECTIONS:
              raise SystemExit("Unsupported transfer direction.")
          if sanitized["install_extra"] not in ALLOWED_EXTRAS:
              raise SystemExit("Unsupported install extra.")
          if sanitized["frequency_high"] != "inf" and float(sanitized["frequency_high"]) < float(sanitized["frequency_low"]):
              raise SystemExit("frequency_high must be >= frequency_low.")

          raw_batches = sanitized["participant_batches"]
          if raw_batches:
              chunks = [chunk for chunk in raw_batches.split(";") if chunk]
          elif sanitized["participants"]:
              chunks = [sanitized["participants"]]
          else:
              chunks = [""]

          batches = []
          for index, participants in enumerate(chunks, start=1):
              label = participants or "auto"
              slug = re.sub(r"[^A-Za-z0-9]+", "-", label).strip("-").lower() or "auto"
              batches.append({"batch_id": f"{index:02d}-{slug[:48]}", "participants": participants})

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              for name, value in sanitized.items():
                  output.write(f"{name}={value}\n")
              output.write(f"batches={json.dumps(batches)}\n")
          print(json.dumps({"batches": batches, **sanitized}, indent=2))
          PY

  stimulus-decoding:
    name: Run stimulus decoding (${{ matrix.batch_id }})
    needs: prepare-inputs
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.prepare-inputs.outputs.max_parallel) }}
      matrix:
        include: ${{ fromJSON(needs.prepare-inputs.outputs.batches) }}
    env:
      DATA_DIR: ${{ needs.prepare-inputs.outputs.data_dir }}
      USE_NEXTCLOUD_DATA: ${{ needs.prepare-inputs.outputs.use_nextcloud_data }}
      DATA_CACHE_VERSION: ${{ needs.prepare-inputs.outputs.data_cache_version }}
      INSTALL_EXTRA: ${{ needs.prepare-inputs.outputs.install_extra }}
      TIME_WINDOW: ${{ needs.prepare-inputs.outputs.time_window }}
      WINDOW_STEP_S: ${{ needs.prepare-inputs.outputs.window_step_s }}
      DIAGNOSTIC_WINDOW_CENTERS: ${{ needs.prepare-inputs.outputs.diagnostic_window_centers }}
      WINDOW_SIZE: ${{ needs.prepare-inputs.outputs.window_size }}
      TRANSFER_DIRECTION: ${{ needs.prepare-inputs.outputs.transfer_direction }}
      CLASSIFIER: ${{ needs.prepare-inputs.outputs.classifier }}
      CLASSIFIER_PARAM: ${{ needs.prepare-inputs.outputs.classifier_param }}
      COMPONENTS_PCA: ${{ needs.prepare-inputs.outputs.components_pca }}
      FREQUENCY_LOW: ${{ needs.prepare-inputs.outputs.frequency_low }}
      FREQUENCY_HIGH: ${{ needs.prepare-inputs.outputs.frequency_high }}
      CHANCE_CLASSES: ${{ needs.prepare-inputs.outputs.chance_classes }}
      PERMUTATIONS: ${{ needs.prepare-inputs.outputs.permutations }}
      PERMUTATION_SEED: ${{ needs.prepare-inputs.outputs.permutation_seed }}
      OUTPUT_PREFIX: ${{ needs.prepare-inputs.outputs.output_prefix }}
      FAIL_IF_MISSING_DATA: ${{ needs.prepare-inputs.outputs.fail_if_missing_data }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore cached MEG data
        id: meg-data-cache
        if: ${{ env.USE_NEXTCLOUD_DATA == 'true' }}
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.DATA_DIR }}
          key: meg-data-all-${{ runner.os }}-${{ env.DATA_CACHE_VERSION }}

      - name: Install rclone
        if: ${{ env.USE_NEXTCLOUD_DATA == 'true' && steps.meg-data-cache.outputs.cache-hit != 'true' }}
        run: .github/scripts/install-rclone.sh

      - name: Download MEG data files from OwnCloud WebDAV
        if: ${{ env.USE_NEXTCLOUD_DATA == 'true' && steps.meg-data-cache.outputs.cache-hit != 'true' }}
        shell: bash
        env:
          BUSHMEG_WEBDAV_URL: ${{ secrets.BUSHMEG_WEBDAV_URL }}
          BUSHMEG_DATA_KEY: ${{ secrets.BUSHMEG_DATA_KEY }}
          BUSHMEG_DATA_PASSWORD: ${{ secrets.BUSHMEG_DATA_PASSWORD }}
        run: |
          set -euo pipefail
          python3 scripts/download_meg_data_files.py --source webdav-rclone --data-dir "${DATA_DIR}"

      - name: Save MEG data cache
        if: ${{ env.USE_NEXTCLOUD_DATA == 'true' && steps.meg-data-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: ${{ env.DATA_DIR }}
          key: meg-data-all-${{ runner.os }}-${{ env.DATA_CACHE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.prepare-inputs.outputs.python_version }}

      - name: Install package
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ "${INSTALL_EXTRA}" == "none" ]]; then
            python -m pip install -e .
          else
            python -m pip install -e ".[${INSTALL_EXTRA}]"
          fi

      - name: Resolve and validate data directory
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import os
          from pathlib import Path

          root = Path(os.environ["DATA_DIR"]).expanduser()
          fail_if_missing = os.environ["FAIL_IF_MISSING_DATA"].lower() == "true"

          if not root.exists():
              message = f"Data directory does not exist: {root}"
              if fail_if_missing:
                  raise SystemExit(message)
              print(message)
              with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as env_file:
                  env_file.write(f"PYMEGDEC_ANALYSIS_DATA_DIR={root}\n")
              raise SystemExit(0)

          candidate_counts: dict[Path, tuple[int, int]] = {}
          for main_file in root.rglob("Part*Data.mat"):
              if main_file.name.endswith("CueData.mat"):
                  continue
              directory = main_file.parent
              main_count, cue_count = candidate_counts.get(directory, (0, 0))
              candidate_counts[directory] = (main_count + 1, cue_count)
          for cue_file in root.rglob("Part*CueData.mat"):
              directory = cue_file.parent
              main_count, cue_count = candidate_counts.get(directory, (0, 0))
              candidate_counts[directory] = (main_count, cue_count + 1)

          valid_candidates = [
              (directory, counts)
              for directory, counts in candidate_counts.items()
              if counts[0] > 0 and counts[1] > 0
          ]
          if not valid_candidates:
              message = f"No directory containing both Part*Data.mat and Part*CueData.mat was found under {root}."
              if fail_if_missing:
                  raise SystemExit(message)
              print(message)
              resolved = root
          else:
              resolved, counts = max(valid_candidates, key=lambda item: (item[1][0] + item[1][1], str(item[0])))
              print(f"Resolved MEG data directory: {resolved}")
              print(f"Found {counts[0]} main MAT files and {counts[1]} cue MAT files in the resolved directory.")

          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as env_file:
              env_file.write(f"PYMEGDEC_ANALYSIS_DATA_DIR={resolved}\n")
          PY

      - name: Run 16-way time-resolved stimulus decoding
        shell: bash
        env:
          BATCH_ID: ${{ matrix.batch_id }}
          BATCH_PARTICIPANTS: ${{ matrix.participants }}
        run: |
          set -euo pipefail
          mkdir -p outputs

          output_prefix="${OUTPUT_PREFIX}_${BATCH_ID}"
          output_csv="outputs/${output_prefix}.csv"
          summary_csv="outputs/${output_prefix}_summary.csv"
          predictions_csv="outputs/${output_prefix}_predictions.csv"
          confusion_csv="outputs/${output_prefix}_confusion.csv"
          per_stimulus_csv="outputs/${output_prefix}_per_stimulus.csv"
          participant_peaks_csv="outputs/${output_prefix}_participant_peaks.csv"
          plots_dir="outputs/${output_prefix}_plots"

          cmd=(
            pymegdec-stimulus-decoding
            --data-dir "${PYMEGDEC_ANALYSIS_DATA_DIR}"
            --output "${output_csv}"
            --summary-output "${summary_csv}"
            --participant-peaks-output "${participant_peaks_csv}"
            --plots-dir "${plots_dir}"
            "--time-window=${TIME_WINDOW}"
            --window-step-s "${WINDOW_STEP_S}"
            --window-size "${WINDOW_SIZE}"
            --null-window-center nan
            --transfer-direction "${TRANSFER_DIRECTION}"
            --classifier "${CLASSIFIER}"
            --components-pca "${COMPONENTS_PCA}"
            --frequency-range "${FREQUENCY_LOW}" "${FREQUENCY_HIGH}"
            --chance-classes "${CHANCE_CLASSES}"
            --permutations "${PERMUTATIONS}"
            --permutation-seed "${PERMUTATION_SEED}"
          )

          if [[ -n "${DIAGNOSTIC_WINDOW_CENTERS}" ]]; then
            cmd+=(
              --diagnostic-window-centers "${DIAGNOSTIC_WINDOW_CENTERS}"
              --predictions-output "${predictions_csv}"
              --confusion-output "${confusion_csv}"
              --per-stimulus-output "${per_stimulus_csv}"
            )
          fi
          if [[ -n "${BATCH_PARTICIPANTS}" ]]; then
            cmd+=(--participants "${BATCH_PARTICIPANTS}")
          fi
          if [[ -n "${CLASSIFIER_PARAM}" ]]; then
            cmd+=(--classifier-param "${CLASSIFIER_PARAM}")
          fi

          printf 'Running command:'
          printf ' %q' "${cmd[@]}"
          printf '\n'
          "${cmd[@]}"

          {
            echo "# Stimulus decoding run"
            echo
            echo "- Batch: \`${BATCH_ID}\`"
            echo "- Data directory: \`${PYMEGDEC_ANALYSIS_DATA_DIR}\`"
            echo "- Participants: \`${BATCH_PARTICIPANTS:-auto-detected}\`"
            echo "- Time-window centers: \`${TIME_WINDOW}\`"
            echo "- Window step: \`${WINDOW_STEP_S}\` s"
            echo "- Diagnostic window centers: \`${DIAGNOSTIC_WINDOW_CENTERS:-disabled}\`"
            echo "- Window size: \`${WINDOW_SIZE}\` s"
            echo "- Classifier: \`${CLASSIFIER}\`"
            echo "- PCA components: \`${COMPONENTS_PCA}\`"
            echo "- Frequency range: \`${FREQUENCY_LOW}\` to \`${FREQUENCY_HIGH}\` Hz"
            echo "- Chance level: 1 / ${CHANCE_CLASSES}"
            echo "- Permutations: \`${PERMUTATIONS}\`"
            echo "- Permutation seed: \`${PERMUTATION_SEED}\`"
            echo
            echo "The workflow forces \`--null-window-center nan\`. Therefore pre-stimulus time points are evaluated as ordinary 16-way decoding windows instead of being appended as a separate null class. Compare pre-stimulus accuracy with post-stimulus accuracy in the summary CSV/plots."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload decoding outputs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ needs.prepare-inputs.outputs.output_prefix }}-${{ matrix.batch_id }}-outputs
          path: outputs/
          if-no-files-found: warn

  aggregate-outputs:
    name: Aggregate decoding outputs
    needs:
      - prepare-inputs
      - stimulus-decoding
    if: always() && needs.prepare-inputs.result == 'success'
    runs-on: ubuntu-latest
    env:
      OUTPUT_PREFIX: ${{ needs.prepare-inputs.outputs.output_prefix }}

    steps:
      - name: Download shard artifacts
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          pattern: ${{ needs.prepare-inputs.outputs.output_prefix }}-*-outputs
          path: shard-artifacts
          merge-multiple: false

      - name: Combine participant rows and recompute summary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p outputs_combined
          python3 - <<'PY'
          from __future__ import annotations

          import csv
          import math
          import os
          from collections import defaultdict
          from pathlib import Path

          root = Path("shard-artifacts")
          output_prefix = os.environ["OUTPUT_PREFIX"]
          combined_dir = Path("outputs_combined")
          combined_dir.mkdir(parents=True, exist_ok=True)

          file_groups = {
              "raw": [],
              "summary": [],
              "predictions": [],
              "confusion": [],
              "per_stimulus": [],
              "participant_peaks": [],
          }
          if root.exists():
              for path in root.rglob("*.csv"):
                  if path.name.endswith("_summary.csv"):
                      file_groups["summary"].append(path)
                  elif path.name.endswith("_predictions.csv"):
                      file_groups["predictions"].append(path)
                  elif path.name.endswith("_confusion.csv"):
                      file_groups["confusion"].append(path)
                  elif path.name.endswith("_per_stimulus.csv"):
                      file_groups["per_stimulus"].append(path)
                  elif path.name.endswith("_participant_peaks.csv"):
                      file_groups["participant_peaks"].append(path)
                  else:
                      file_groups["raw"].append(path)

          def read_csv(path: Path) -> list[dict[str, str]]:
              with path.open("r", encoding="utf-8", newline="") as handle:
                  return list(csv.DictReader(handle))

          def to_float(value: object) -> float:
              try:
                  return float(value)
              except (TypeError, ValueError):
                  return math.nan

          def write_rows(path: Path, rows: list[dict[str, object]]) -> None:
              if not rows:
                  return
              fieldnames: list[str] = []
              for row in rows:
                  for field in row:
                      if field not in fieldnames:
                          fieldnames.append(field)
              with path.open("w", encoding="utf-8", newline="") as handle:
                  writer = csv.DictWriter(handle, fieldnames=fieldnames, extrasaction="ignore")
                  writer.writeheader()
                  writer.writerows(rows)

          raw_rows: list[dict[str, str]] = []
          for path in sorted(file_groups["raw"]):
              rows = read_csv(path)
              for row in rows:
                  row["source_file"] = str(path)
                  raw_rows.append(row)
          write_rows(combined_dir / f"{output_prefix}.csv", raw_rows)

          grouped: dict[tuple[str, str], list[dict[str, str]]] = defaultdict(list)
          for row in raw_rows:
              grouped[(row.get("variant", ""), row.get("window_center_s", ""))].append(row)

          summary_rows = []
          for (variant, window_center), rows in sorted(grouped.items(), key=lambda item: (item[0][0], to_float(item[0][1]))):
              accuracies = [to_float(row.get("accuracy")) for row in rows]
              accuracies = [value for value in accuracies if math.isfinite(value)]
              mean = sum(accuracies) / len(accuracies) if accuracies else math.nan
              std = math.sqrt(sum((value - mean) ** 2 for value in accuracies) / (len(accuracies) - 1)) if len(accuracies) > 1 else 0.0
              sem = std / math.sqrt(len(accuracies)) if accuracies else math.nan
              chance_accuracy = to_float(rows[0].get("chance_accuracy")) if rows else math.nan
              p_values = [to_float(row.get("permutation_p_value")) for row in rows]
              finite_p_values = [value for value in p_values if math.isfinite(value)]
              percents = sorted(100.0 * value for value in accuracies)
              if percents:
                  mid = len(percents) // 2
                  median = percents[mid] if len(percents) % 2 else (percents[mid - 1] + percents[mid]) / 2
              else:
                  median = math.nan
              summary_rows.append(
                  {
                      "variant": variant,
                      "window_center_s": window_center,
                      "n_participants": len(rows),
                      "accuracy_mean": mean,
                      "accuracy_std": std,
                      "accuracy_sem": sem,
                      "percent_mean": 100.0 * mean if math.isfinite(mean) else math.nan,
                      "percent_median": median,
                      "percent_std": 100.0 * std if math.isfinite(std) else math.nan,
                      "percent_sem": 100.0 * sem if math.isfinite(sem) else math.nan,
                      "chance_accuracy": chance_accuracy,
                      "chance_percent": 100.0 * chance_accuracy if math.isfinite(chance_accuracy) else math.nan,
                      "above_chance_count": sum(value > chance_accuracy for value in accuracies if math.isfinite(chance_accuracy)),
                      "n_with_permutation": len(finite_p_values),
                      "n_significant_p_0.05": sum(value < 0.05 for value in finite_p_values),
                      "n_significant_p_0.01": sum(value < 0.01 for value in finite_p_values),
                  }
              )

          fields = [
              "variant", "window_center_s", "n_participants", "accuracy_mean", "accuracy_std",
              "accuracy_sem", "percent_mean", "percent_median", "percent_std", "percent_sem",
              "chance_accuracy", "chance_percent", "above_chance_count", "n_with_permutation",
              "n_significant_p_0.05", "n_significant_p_0.01",
          ]
          if summary_rows:
              write_rows(combined_dir / f"{output_prefix}_summary.csv", summary_rows)

          prediction_rows: list[dict[str, str]] = []
          for path in sorted(file_groups["predictions"]):
              rows = read_csv(path)
              for row in rows:
                  row["source_file"] = str(path)
                  prediction_rows.append(row)
          write_rows(combined_dir / f"{output_prefix}_predictions.csv", prediction_rows)

          confusion_counts: dict[tuple[str, str, str, str], int] = defaultdict(int)
          per_stimulus_counts: dict[tuple[str, str, str], dict[str, object]] = defaultdict(
              lambda: {"n_trials": 0, "n_correct": 0, "participants": set()}
          )
          for row in prediction_rows:
              confusion_counts[
                  (
                      row.get("variant", ""),
                      row.get("window_center_s", ""),
                      row.get("true_stimulus", ""),
                      row.get("predicted_stimulus", ""),
                  )
              ] += 1
              key = (row.get("variant", ""), row.get("window_center_s", ""), row.get("true_stimulus", ""))
              per_stimulus_counts[key]["n_trials"] += 1
              per_stimulus_counts[key]["n_correct"] += int(str(row.get("correct", "")).lower() == "true")
              per_stimulus_counts[key]["participants"].add(row.get("participant", ""))

          combined_confusion = [
              {
                  "variant": variant,
                  "window_center_s": window_center,
                  "true_stimulus": true_stimulus,
                  "predicted_stimulus": predicted_stimulus,
                  "count": count,
              }
              for (variant, window_center, true_stimulus, predicted_stimulus), count in sorted(
                  confusion_counts.items(),
                  key=lambda item: (item[0][0], to_float(item[0][1]), to_float(item[0][2]), to_float(item[0][3])),
              )
          ]
          write_rows(combined_dir / f"{output_prefix}_confusion.csv", combined_confusion)

          combined_per_stimulus = []
          for (variant, window_center, true_stimulus), values in sorted(
              per_stimulus_counts.items(),
              key=lambda item: (item[0][0], to_float(item[0][1]), to_float(item[0][2])),
          ):
              n_trials = int(values["n_trials"])
              n_correct = int(values["n_correct"])
              accuracy = n_correct / n_trials if n_trials else math.nan
              combined_per_stimulus.append(
                  {
                      "variant": variant,
                      "window_center_s": window_center,
                      "true_stimulus": true_stimulus,
                      "n_participants": len(values["participants"]),
                      "n_trials": n_trials,
                      "n_correct": n_correct,
                      "accuracy": accuracy,
                      "percent": 100.0 * accuracy if math.isfinite(accuracy) else math.nan,
                  }
              )
          write_rows(combined_dir / f"{output_prefix}_per_stimulus.csv", combined_per_stimulus)

          peak_groups: dict[tuple[str, str], list[dict[str, str]]] = defaultdict(list)
          for row in raw_rows:
              peak_groups[(row.get("variant", ""), row.get("participant", ""))].append(row)
          participant_peaks = []
          for (variant, participant), rows in sorted(peak_groups.items(), key=lambda item: (item[0][0], to_float(item[0][1]))):
              peak = max(rows, key=lambda row: (to_float(row.get("accuracy")), -abs(to_float(row.get("window_center_s")))))
              participant_peaks.append(
                  {
                      "participant": participant,
                      "variant": variant,
                      "peak_window_center_s": peak.get("window_center_s", ""),
                      "peak_window_start_s": peak.get("window_start_s", ""),
                      "peak_window_stop_s": peak.get("window_stop_s", ""),
                      "peak_accuracy": peak.get("accuracy", ""),
                      "peak_percent": peak.get("percent", ""),
                      "chance_accuracy": peak.get("chance_accuracy", ""),
                      "chance_percent": peak.get("chance_percent", ""),
                  }
              )
          write_rows(combined_dir / f"{output_prefix}_participant_peaks.csv", participant_peaks)

          report = [
              "# Combined stimulus decoding outputs",
              "",
              f"- Raw shard CSV files found: `{len(file_groups['raw'])}`",
              f"- Shard summary CSV files found: `{len(file_groups['summary'])}`",
              f"- Prediction CSV files found: `{len(file_groups['predictions'])}`",
              f"- Combined participant/window rows: `{len(raw_rows)}`",
              f"- Combined summary rows: `{len(summary_rows)}`",
              f"- Combined prediction rows: `{len(prediction_rows)}`",
              f"- Combined confusion rows: `{len(combined_confusion)}`",
              f"- Combined per-stimulus rows: `{len(combined_per_stimulus)}`",
              f"- Combined participant peak rows: `{len(participant_peaks)}`",
          ]
          (combined_dir / "README.md").write_text("\n".join(report) + "\n", encoding="utf-8")
          print("\n".join(report))
          PY

      - name: Upload combined decoding outputs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ needs.prepare-inputs.outputs.output_prefix }}-combined-outputs
          path: outputs_combined/
          if-no-files-found: warn
